<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#120a16">
<title>一瞬 · Blink Rush</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #120a16; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
  #game { position: fixed; inset: 0; display: block; }

  .layer { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
           color: #fee; text-align: center; pointer-events: none; }
  .layer.show { pointer-events: auto; }

  .title { font-size: 13vw; font-weight: 800; letter-spacing: .25em; text-indent: .25em;
           background: linear-gradient(180deg, #ffd36a, #ff7a59 55%, #ff4d8d);
           -webkit-background-clip: text; background-clip: text; color: transparent;
           text-shadow: 0 0 30px rgba(255,140,80,.35); }
  .sub { margin-top: 1vh; font-size: 4.2vw; color: #fb9; letter-spacing: .1em; }
  .hint { margin-top: 5vh; font-size: 4vw; color: #fed; line-height: 1.9; opacity: .92; }
  .hint b { color: #6cf; }

  .btn { pointer-events: auto; margin-top: 6vh; padding: 3.2vw 12vw; font-size: 5.5vw; font-weight: 700;
         color: #2a0f12; border: none; border-radius: 999px; cursor: pointer;
         background: linear-gradient(180deg, #ffd07a, #ff7a59);
         box-shadow: 0 8px 30px rgba(255,120,80,.45), inset 0 2px 4px rgba(255,255,255,.5);
         transition: transform .08s; }
  .btn:active { transform: scale(.94); }
  .btn.ghost { background: rgba(255,255,255,.1); color: #fed; box-shadow: inset 0 0 0 2px rgba(255,160,120,.4); }

  .gostat { font-size: 5vw; color: #fed; margin: .6vh 0; }
  .gostat b { font-size: 11vw; color: #ff9; display: block; line-height: 1.1; text-shadow: 0 0 20px rgba(255,200,80,.5); }
  .new { color: #6cf; font-size: 4.5vw; font-weight: 700; animation: pop .5s; }
  @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.25)} 100%{transform:scale(1)} }
  .row { display: flex; gap: 3vw; }

  #hud { position: fixed; top: 0; left: 0; right: 0; padding: env(safe-area-inset-top,12px) 16px 0; pointer-events: none; }
  .topline { display: flex; justify-content: space-between; align-items: flex-start; }
  .score { font-size: 9vw; font-weight: 800; color: #fff; text-shadow: 0 2px 12px rgba(0,0,0,.6); line-height: 1; }
  .best { font-size: 3.6vw; color: #fb9; margin-top: 1vw; }
  .spd { font-size: 4vw; font-weight: 800; text-align: right; }
  .enwrap { margin-top: 2vw; height: 2.2vw; max-height: 14px; background: rgba(255,255,255,.12); border-radius: 999px; overflow: hidden; }
  .enbar { height: 100%; width: 100%; border-radius: 999px; background: linear-gradient(90deg, #6cf, #4d8dff); transition: width .05s; }
  .enbar.low { background: linear-gradient(90deg, #ff5a5a, #ff8c4d); }
  .hidden { display: none !important; }
  .fade { transition: opacity .35s; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div class="topline">
    <div>
      <div class="score" id="score">0</div>
      <div class="best" id="bestHud">最佳 0</div>
    </div>
    <div class="spd" id="spd"></div>
  </div>
  <div class="enwrap"><div class="enbar" id="enbar"></div></div>
</div>

<div class="layer show fade" id="menu">
  <div class="title">一瞬</div>
  <div class="sub">BLINK&nbsp;RUSH</div>
  <div class="hint">你快到看不清，正面全是死。<br><b>按住</b>让时间近乎静止，滑动穿过缝隙<br><b>松手</b>世界提速爆冲<br>越快越高分，但慢放会耗尽能量</div>
  <button class="btn" id="startBtn">开 始</button>
</div>

<div class="layer fade hidden" id="over">
  <div class="gostat">冲出了<b id="finalScore">0</b>分</div>
  <div class="new hidden" id="newBest">★ 新纪录 ★</div>
  <div class="gostat" style="font-size:4vw;margin-top:2vh">最佳 <span id="bestOver">0</span> 分</div>
  <div class="row">
    <button class="btn" id="retryBtn">再 来</button>
    <button class="btn ghost" id="shareBtn">晒 分</button>
  </div>
</div>

<script>
(() => {
  'use strict';
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  let W = 0, H = 0, DPR = 1, S = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    S = Math.min(Math.max(H / 720, 0.6), 2);
  }
  window.addEventListener('resize', resize); resize();

  let AC = null, muted = false;
  function actx() { if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } return AC; }
  function beep(freq, dur, type, vol) {
    if (muted) return; const a = actx(); if (!a) return;
    const o = a.createOscillator(), g = a.createGain();
    o.type = type || 'sine'; o.frequency.value = freq; g.gain.value = (vol || 0.1);
    o.connect(g); g.connect(a.destination); const t = a.currentTime; o.start(t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + (dur || 0.12));
    o.stop(t + (dur || 0.12) + 0.02);
  }

  const ST = { MENU: 0, PLAY: 1, OVER: 2 };
  let state = ST.MENU;
  let best = +(localStorage.getItem('blinkrush_best') || 0);

  const PX = () => W * 0.34;
  const player = { y: 0, vy: 0, r: 14 };
  let obstacles = [];
  let particles = [];
  let trail = [];
  let speed = 0;
  let timeScale = 1, targetScale = 1;
  let energy = 1;
  let touching = false, touchY = 0;
  let score = 0, distAccum = 0, bonus = 0, combo = 0;
  let spawnX = 0;
  let shake = 0, flash = 0;
  let dead = false, deadTimer = 0;
  let speedLines = [];

  function reset() {
    player.y = H * 0.5; player.vy = 0; player.r = 14 * S;
    obstacles = []; particles = []; trail = []; speedLines = [];
    speed = 360 * S; timeScale = 1; targetScale = 1; energy = 1;
    touching = false; score = 0; distAccum = 0; bonus = 0; combo = 0;
    shake = 0; flash = 0; dead = false; deadTimer = 0;
    spawnX = W + 200 * S;
    for (let i = 0; i < 40; i++) speedLines.push({ x: Math.random() * W, y: Math.random() * H, len: 0 });
    gen();
  }

  function gen() {
    while (spawnX < W + 900 * S + PX()) {
      const d = Math.min(score / 800, 1);
      const gapH = (200 - d * 90) * S + Math.random() * 30 * S;
      const margin = 70 * S;
      const gapY = margin + Math.random() * (H - gapH - margin * 2);
      obstacles.push({ x: spawnX, gapY, gapH, passed: false });
      const spacing = (360 - d * 110) * S + Math.random() * 60 * S;
      spawnX += spacing;
    }
  }

  function pos(e) { const t = e.touches ? e.touches[0] : e; return { x: t.clientX, y: t.clientY }; }
  function down(y) { if (state !== ST.PLAY || dead) return; touching = true; touchY = y; }
  function move(y) { if (touching) touchY = y; }
  function up() { touching = false; }
  cv.addEventListener('touchstart', e => { e.preventDefault(); actx(); down(pos(e).y); }, { passive: false });
  cv.addEventListener('touchmove', e => { e.preventDefault(); move(pos(e).y); }, { passive: false });
  cv.addEventListener('touchend', e => { e.preventDefault(); up(); }, { passive: false });
  cv.addEventListener('mousedown', e => { actx(); down(e.clientY); });
  window.addEventListener('mousemove', e => move(e.clientY));
  window.addEventListener('mouseup', up);

  function burst(x, y, color, n) {
    for (let i = 0; i < (n || 8); i++) {
      const a = Math.random() * Math.PI * 2, sp = (40 + Math.random() * 220) * S;
      particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, color, r: (1.5 + Math.random() * 3) * S });
    }
  }

  function update(dt) {
    if (state !== ST.PLAY) { updateParticles(dt, 1); return; }
    const realDt = dt;

    if (!dead) {
      const canSlow = energy > 0.02;
      targetScale = (touching && canSlow) ? 0.16 : 1;
      timeScale += (targetScale - timeScale) * Math.min(1, realDt * 12);

      // 能量：慢放消耗，常速回充
      if (timeScale < 0.6) energy -= realDt * 0.5; else energy += realDt * 0.32;
      energy = Math.max(0, Math.min(1, energy));

      // 控制（实时，手感顺滑）
      if (touching) {
        const ty = Math.max(player.r, Math.min(H - player.r, touchY));
        player.y += (ty - player.y) * Math.min(1, realDt * 16);
      }

      const sdt = realDt * timeScale; // 世界用缩放时间
      speed += 5 * S * realDt;        // 提速按真实时间，越久越快
      distAccum += speed * sdt;
      score = Math.floor(distAccum / 20) + bonus;

      // 障碍移动 + 碰撞 + 计分
      const px = PX();
      for (const o of obstacles) {
        o.x -= speed * sdt;
        const dx = Math.abs(o.x - px);
        if (dx < 15 * S + player.r) {
          if (player.y - player.r * 0.55 < o.gapY || player.y + player.r * 0.55 > o.gapY + o.gapH) { die(); break; }
        }
        if (!o.passed && o.x < px - 15 * S) {
          o.passed = true;
          // 极速通过加成
          const fast = timeScale > 0.7;
          combo = fast ? combo + 1 : 0;
          const edge = Math.min(player.y - o.gapY, o.gapY + o.gapH - player.y);
          const near = edge < player.r * 1.4;
          let pts = fast ? 8 : 3;
          if (near) pts += 6;
          if (fast && combo > 1) pts += combo;
          bonus += pts;
          beep(fast ? 880 + combo * 25 : 520, 0.07, fast ? 'square' : 'triangle', 0.08);
          if (near) { shake = Math.min(shake + 5, 12); burst(px, player.y, '#fff', 8); }
          burst(px + 12 * S, player.y, fast ? '#ffd36a' : '#6cf', 6);
        }
      }

      // 生成标记随世界一起左滚，保证持续刷新障碍
      spawnX -= speed * sdt;

      // 拖尾
      trail.push({ x: px, y: player.y, ts: timeScale });
      if (trail.length > 16) trail.shift();
    } else {
      deadTimer -= realDt;
      if (deadTimer <= 0) gameOver();
    }

    obstacles = obstacles.filter(o => o.x > -60 * S);
    gen();
    if (shake > 0) shake = Math.max(0, shake - realDt * 26);
    if (flash > 0) flash = Math.max(0, flash - realDt * 3);
    updateParticles(realDt, dead ? 1 : timeScale);

    document.getElementById('score').textContent = score;
    const eb = document.getElementById('enbar');
    eb.style.width = (energy * 100) + '%';
    eb.classList.toggle('low', energy < 0.25);
    const spdEl = document.getElementById('spd');
    if (timeScale < 0.5) { spdEl.textContent = '⏱ 慢放'; spdEl.style.color = '#6cf'; }
    else { spdEl.textContent = combo > 1 ? '🔥 极速 x' + combo : '⚡ 极速'; spdEl.style.color = '#ffb05a'; }
  }

  function updateParticles(dt, ts) {
    const d = dt * (0.3 + 0.7 * ts);
    for (const p of particles) { p.x += p.vx * d; p.y += p.vy * d; p.vx *= 0.96; p.vy *= 0.96; p.life -= dt * 1.6; }
    particles = particles.filter(p => p.life > 0);
  }

  function die() {
    if (dead) return; dead = true; deadTimer = 0.7; touching = false;
    shake = 18; flash = 1; beep(120, 0.45, 'sawtooth', 0.18);
    for (let i = 0; i < 34; i++) burst(PX(), player.y, '#ff5a5a', 1);
  }
  function gameOver() {
    state = ST.OVER;
    const isNew = score > best;
    if (isNew) { best = score; localStorage.setItem('blinkrush_best', best); }
    document.getElementById('finalScore').textContent = score;
    document.getElementById('bestOver').textContent = best;
    document.getElementById('bestHud').textContent = '最佳 ' + best;
    document.getElementById('newBest').classList.toggle('hidden', !isNew);
    showLayer('over');
  }

  function render() {
    ctx.save();
    if (shake > 0) ctx.translate((Math.random() - .5) * shake, (Math.random() - .5) * shake);

    // 背景：随时间缩放冷暖切换
    const warm = timeScale;             // 1 暖 0 冷
    const g = ctx.createLinearGradient(0, 0, 0, H);
    const top = mix([18, 10, 22], [10, 22, 40], warm);
    const bot = mix([40, 14, 26], [12, 30, 44], warm);
    g.addColorStop(0, rgb(top)); g.addColorStop(1, rgb(bot));
    ctx.fillStyle = g; ctx.fillRect(-30, -30, W + 60, H + 60);

    // 速度线（越快越明显）
    const fastness = timeScale;
    for (const l of speedLines) {
      l.x -= speed * 0.016 * (0.4 + fastness);
      if (l.x < -200) { l.x = W + Math.random() * 200; l.y = Math.random() * H; }
      const len = (40 + fastness * 160) * S;
      ctx.strokeStyle = 'rgba(255,200,140,' + (0.05 + fastness * 0.12) + ')';
      ctx.lineWidth = 2 * S;
      ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x + len, l.y); ctx.stroke();
    }

    // 障碍
    const px = PX();
    for (const o of obstacles) {
      const close = Math.abs(o.x - px) < 120 * S && !o.passed;
      ctx.fillStyle = close ? '#ff6a8d' : '#7a3a6a';
      // 上墙
      roundBar(o.x - 15 * S, -10, 30 * S, o.gapY + 10);
      // 下墙
      roundBar(o.x - 15 * S, o.gapY + o.gapH, 30 * S, H - (o.gapY + o.gapH) + 10);
      // 缝隙高亮
      ctx.fillStyle = close ? 'rgba(108,200,255,.25)' : 'rgba(108,200,255,.1)';
      ctx.fillRect(o.x - 15 * S, o.gapY, 30 * S, o.gapH);
    }

    // 拖尾
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i], a = i / trail.length;
      ctx.beginPath();
      ctx.fillStyle = 'rgba(255,' + Math.floor(180 + 60 * a) + ',120,' + (a * 0.4) + ')';
      ctx.arc(t.x - (trail.length - i) * 6 * S * (1 - 0.6), t.y, player.r * a * 0.8, 0, 7); ctx.fill();
    }

    // 玩家（飞梭）
    if (!dead || Math.floor(deadTimer * 20) % 2 === 0) {
      ctx.save(); ctx.translate(px, player.y);
      ctx.beginPath(); ctx.fillStyle = 'rgba(255,180,120,.3)';
      ctx.arc(0, 0, player.r * 2, 0, 7); ctx.fill();
      ctx.shadowColor = '#ffb05a'; ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.fillStyle = '#fff7e8';
      ctx.moveTo(player.r * 1.4, 0);
      ctx.lineTo(-player.r, -player.r * 0.9);
      ctx.lineTo(-player.r * 0.4, 0);
      ctx.lineTo(-player.r, player.r * 0.9);
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur = 0; ctx.restore();
    }

    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 慢放：冷色蒙版 + 暗角
    if (timeScale < 0.85) {
      const a = (0.85 - timeScale) * 0.5;
      ctx.fillStyle = 'rgba(40,90,160,' + a + ')';
      ctx.fillRect(-30, -30, W + 60, H + 60);
      const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.75);
      vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,10,30,' + (a + 0.2) + ')');
      ctx.fillStyle = vg; ctx.fillRect(-30, -30, W + 60, H + 60);
    }
    ctx.restore();

    // 死亡闪白
    if (flash > 0) { ctx.fillStyle = 'rgba(255,80,80,' + (flash * 0.5) + ')'; ctx.fillRect(0, 0, W, H); }
  }

  function roundBar(x, y, w, h) { ctx.fillRect(x, y, w, h); }
  function mix(a, b, t) { return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t]; }
  function rgb(c) { return 'rgb(' + (c[0] | 0) + ',' + (c[1] | 0) + ',' + (c[2] | 0) + ')'; }

  let last = performance.now();
  function loop(now) {
    let dt = (now - last) / 1000; last = now; if (dt > 0.05) dt = 0.05;
    update(dt); render(); requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  function showLayer(id) {
    for (const l of document.querySelectorAll('.layer')) {
      if (l.id === id) { l.classList.remove('hidden'); requestAnimationFrame(() => l.classList.add('show')); }
      else { l.classList.add('hidden'); l.classList.remove('show'); }
    }
  }
  function startGame() { document.getElementById('bestHud').textContent = '最佳 ' + best; reset(); state = ST.PLAY; showLayer(''); }
  document.getElementById('startBtn').onclick = () => { actx(); startGame(); };
  document.getElementById('retryBtn').onclick = startGame;
  document.getElementById('shareBtn').onclick = async () => {
    const text = `我在《一瞬》里冲到了 ${score} 分！子弹时间穿缝跑酷，来比比手速 →`;
    try { if (navigator.share) await navigator.share({ title: '一瞬 Blink Rush', text }); else { await navigator.clipboard.writeText(text); alert('成绩已复制！'); } } catch (e) {}
  };
  document.getElementById('bestHud').textContent = '最佳 ' + best;
})();
</script>
</body>
</html>
