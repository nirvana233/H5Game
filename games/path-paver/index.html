<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#101826">
<title>铺路狂魔 · Path Paver</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0e1422; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
  #game { position: fixed; inset: 0; display: block; }

  .layer { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
           color: #eef; text-align: center; pointer-events: none; }
  .layer.show { pointer-events: auto; }

  .title { font-size: 12vw; font-weight: 800; letter-spacing: .15em; text-indent: .15em;
           background: linear-gradient(180deg, #7dffc4, #2ee6a0 60%, #19c8ff);
           -webkit-background-clip: text; background-clip: text; color: transparent;
           text-shadow: 0 0 30px rgba(60,255,180,.3); }
  .sub { margin-top: 1vh; font-size: 4.2vw; color: #8fb; letter-spacing: .1em; }
  .hint { margin-top: 5vh; font-size: 4vw; color: #cfe; line-height: 1.9; opacity: .92; }
  .hint b { color: #6fe; }

  .btn { pointer-events: auto; margin-top: 6vh; padding: 3.2vw 12vw; font-size: 5.5vw; font-weight: 700;
         color: #042018; border: none; border-radius: 999px; cursor: pointer;
         background: linear-gradient(180deg, #8fffce, #2ee6a0);
         box-shadow: 0 8px 30px rgba(50,230,160,.45), inset 0 2px 4px rgba(255,255,255,.6);
         transition: transform .08s; }
  .btn:active { transform: scale(.94); }
  .btn.ghost { background: rgba(255,255,255,.1); color: #cfe; box-shadow: inset 0 0 0 2px rgba(120,255,200,.4); }

  .gostat { font-size: 5vw; color: #cfe; margin: .6vh 0; }
  .gostat b { font-size: 11vw; color: #6fe; display: block; line-height: 1.1; text-shadow: 0 0 20px rgba(80,255,200,.5); }
  .new { color: #ffd76a; font-size: 4.5vw; font-weight: 700; animation: pop .5s; }
  @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.25)} 100%{transform:scale(1)} }
  .row { display: flex; gap: 3vw; }

  #hud { position: fixed; top: 0; left: 0; right: 0; padding: env(safe-area-inset-top,12px) 16px 0; pointer-events: none; }
  .topline { display: flex; justify-content: space-between; align-items: flex-start; }
  .score { font-size: 9vw; font-weight: 800; color: #fff; text-shadow: 0 2px 12px rgba(0,0,0,.6); line-height: 1; }
  .best { font-size: 3.6vw; color: #8db; margin-top: 1vw; letter-spacing: .05em; }
  .inkwrap { margin-top: 2vw; height: 2.2vw; max-height: 14px; background: rgba(255,255,255,.12); border-radius: 999px; overflow: hidden; }
  .inkbar { height: 100%; width: 100%; border-radius: 999px; background: linear-gradient(90deg, #2ee6a0, #19c8ff); transition: width .05s; }
  .inkbar.low { background: linear-gradient(90deg, #ff7a59, #ffb259); }
  .hidden { display: none !important; }
  .fade { transition: opacity .35s; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div class="topline">
    <div>
      <div class="score" id="score">0</div>
      <div class="best" id="bestHud">最佳 0</div>
    </div>
  </div>
  <div class="inkwrap"><div class="inkbar" id="inkbar"></div></div>
</div>

<div class="layer show fade" id="menu">
  <div class="title">铺路狂魔</div>
  <div class="sub">PATH&nbsp;PAVER</div>
  <div class="hint">小人自己往前冲，你管不住他。<br><b>用手指画</b>出脚下的路<br>边跑边铺，<b>别让他掉下去</b><br>墨水有限，省着点用</div>
  <button class="btn" id="startBtn">开 始</button>
</div>

<div class="layer fade hidden" id="over">
  <div class="gostat">铺路<b id="finalScore">0</b>米</div>
  <div class="new hidden" id="newBest">★ 新纪录 ★</div>
  <div class="gostat" style="font-size:4vw;margin-top:2vh">最佳 <span id="bestOver">0</span> 米</div>
  <div class="row">
    <button class="btn" id="retryBtn">再 来</button>
    <button class="btn ghost" id="shareBtn">晒 分</button>
  </div>
</div>

<script>
(() => {
  'use strict';
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  let W = 0, H = 0, DPR = 1, S = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    S = Math.min(Math.max(H / 720, 0.6), 2);
  }
  window.addEventListener('resize', resize); resize();

  let AC = null, muted = false;
  function actx() { if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } return AC; }
  function beep(freq, dur, type, vol) {
    if (muted) return; const a = actx(); if (!a) return;
    const o = a.createOscillator(), g = a.createGain();
    o.type = type || 'sine'; o.frequency.value = freq; g.gain.value = (vol || 0.1);
    o.connect(g); g.connect(a.destination); const t = a.currentTime; o.start(t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + (dur || 0.12));
    o.stop(t + (dur || 0.12) + 0.02);
  }

  const ST = { MENU: 0, PLAY: 1, OVER: 2 };
  let state = ST.MENU;
  let best = +(localStorage.getItem('pathpaver_best') || 0);

  const runner = { x: 0, y: 0, vy: 0, r: 16, grounded: false, run: 0 };
  let platforms = [];   // {x0,x1,y}
  let strokes = [];     // {pts:[{x,y}], life}
  let coins = [];
  let particles = [];
  let cam = 0;
  let genX = 0, curY = 0;
  let speed = 0;
  let score = 0, coinBonus = 0, startX = 0;
  let ink = 0, inkMax = 0;
  let drawing = false, curStroke = null, lastPt = null;
  let shake = 0;
  let dead = false, deadTimer = 0;
  let dist = 0;

  const G = 2400;
  const CLIMB = () => 18 * S;
  const DEATHY = () => H + 70;
  const groundBase = () => H * 0.72;

  function reset() {
    platforms = []; strokes = []; coins = []; particles = [];
    cam = 0; shake = 0; dead = false; deadTimer = 0; dist = 0; score = 0; coinBonus = 0;
    speed = 300 * S;
    inkMax = 260 * S; ink = inkMax;
    drawing = false; curStroke = null; lastPt = null;
    curY = groundBase();
    runner.x = 120 * S; runner.y = curY; runner.vy = 0; runner.grounded = true; runner.run = 0;
    startX = runner.x;
    genX = -200 * S;
    // 开局给一段长平台
    platforms.push({ x0: genX, x1: 360 * S, y: curY });
    genX = 360 * S;
    gen(runner.x + W * 2);
  }

  function gen(toX) {
    while (genX < toX) {
      const d = Math.min(dist / 6000, 1);
      // 间隙（坑）
      const gap = (80 + d * 150) * S + Math.random() * 70 * S;
      // 坑上方放金币奖励画弧线
      if (Math.random() < 0.85) {
        coins.push({ x: genX + gap * 0.5, y: curY - (70 + Math.random() * 90) * S, got: false, ph: Math.random() * 6 });
      }
      genX += gap;
      // 下一段平台，高度有起伏（需要画坡）
      curY += (Math.random() - 0.5) * 2 * (50 + d * 60) * S;
      curY = Math.max(H * 0.46, Math.min(H * 0.84, curY));
      const pw = (180 - d * 50) * S + Math.random() * 120 * S;
      platforms.push({ x0: genX, x1: genX + pw, y: curY });
      genX += pw;
    }
  }

  // 求 x 处玩家能踩到的最高（最小y）表面
  function surfaceAt(x, feetY) {
    let best = Infinity;
    const climb = CLIMB();
    for (const p of platforms) {
      if (x >= p.x0 && x <= p.x1 && p.y >= feetY - climb) best = Math.min(best, p.y);
    }
    for (const s of strokes) {
      const pts = s.pts;
      for (let i = 0; i < pts.length - 1; i++) {
        const a = pts[i], b = pts[i + 1];
        const lo = Math.min(a.x, b.x), hi = Math.max(a.x, b.x);
        if (x < lo || x > hi || hi - lo < 0.5) continue;
        const t = (x - a.x) / (b.x - a.x);
        const y = a.y + (b.y - a.y) * t;
        if (y >= feetY - climb) best = Math.min(best, y);
      }
    }
    return best;
  }

  // ---------- 输入：画线 ----------
  function pos(e) { const t = e.touches ? e.touches[0] : e; return { x: t.clientX, y: t.clientY }; }
  function startDraw(sx, sy) {
    if (state !== ST.PLAY || dead) return;
    if (ink <= 4) return;
    drawing = true;
    curStroke = { pts: [{ x: sx + cam, y: sy }] };
    lastPt = curStroke.pts[0];
    strokes.push(curStroke);
  }
  function moveDraw(sx, sy) {
    if (!drawing || !curStroke) return;
    const wx = sx + cam, wy = sy;
    const dx = wx - lastPt.x, dy = wy - lastPt.y;
    const len = Math.hypot(dx, dy);
    if (len < 5 * S) return;
    if (ink <= 0) { endDraw(); return; }
    const use = Math.min(len, ink);
    ink -= len;
    if (ink < 0) ink = 0;
    const t = use / len;
    const np = { x: lastPt.x + dx * t, y: lastPt.y + dy * t };
    curStroke.pts.push(np); lastPt = np;
    if (Math.random() < 0.3) burst(np.x, np.y, '#6fe', 1, true);
    if (ink <= 0) endDraw();
  }
  function endDraw() { drawing = false; curStroke = null; lastPt = null; }

  cv.addEventListener('touchstart', e => { e.preventDefault(); actx(); const p = pos(e); startDraw(p.x, p.y); }, { passive: false });
  cv.addEventListener('touchmove', e => { e.preventDefault(); const p = pos(e); moveDraw(p.x, p.y); }, { passive: false });
  cv.addEventListener('touchend', e => { e.preventDefault(); endDraw(); }, { passive: false });
  cv.addEventListener('mousedown', e => { actx(); startDraw(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => { if (drawing) moveDraw(e.clientX, e.clientY); });
  window.addEventListener('mouseup', endDraw);

  function burst(x, y, color, n, world) {
    for (let i = 0; i < (n || 8); i++) {
      const a = Math.random() * Math.PI * 2, sp = (30 + Math.random() * 180) * S;
      particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, color, r: (1.5 + Math.random() * 3) * S });
    }
  }

  function update(dt) {
    if (state !== ST.PLAY) { updateParticles(dt); return; }

    if (!dead) {
      speed += 4 * S * dt;                 // 缓慢提速
      runner.x += speed * dt;
      runner.run += speed * dt * 0.02;
      dist = (runner.x - startX);
      score = Math.floor(dist / 24) + coinBonus;

      // 物理 + 落地
      runner.vy += G * S * dt;
      let ny = runner.y + runner.vy * dt;
      const surf = surfaceAt(runner.x, runner.y);
      if (surf !== Infinity && ny >= surf - 0.5) {
        if (runner.vy > 500 * S) { shake = Math.min(shake + 4, 10); beep(180, 0.06, 'sine', 0.06); }
        runner.y = surf; runner.vy = 0; runner.grounded = true;
        if (Math.random() < 0.4) burst(runner.x - runner.r, runner.y, 'rgba(150,255,210,.7)', 1);
      } else {
        runner.y = ny; runner.grounded = false;
      }

      // 金币
      for (const c of coins) {
        if (c.got) continue;
        if (Math.hypot(c.x - runner.x, c.y - runner.y) < 38 * S) {
          c.got = true; coinBonus += 3; ink = Math.min(inkMax, ink + 36 * S); // 收金币回墨，奖励走弧线
          shake = Math.min(shake + 3, 9); beep(720, 0.08, 'square', 0.08);
          burst(c.x, c.y, '#ffd76a', 12);
        }
      }

      // 墨水缓慢回充
      ink = Math.min(inkMax, ink + 26 * S * dt);

      // 死亡：掉出屏幕
      if (runner.y > DEATHY()) die();
    } else {
      deadTimer -= dt;
      runner.vy += G * S * dt; runner.y += runner.vy * dt; runner.x += speed * 0.3 * dt;
      if (deadTimer <= 0) gameOver();
    }

    cam += ((runner.x - W * 0.32) - cam) * Math.min(1, dt * 9);
    if (cam < 0) cam = 0;

    gen(runner.x + W * 2);
    platforms = platforms.filter(p => p.x1 > cam - 100);
    coins = coins.filter(c => c.x > cam - 100 && !(c.got && c.x < cam));
    strokes = strokes.filter(s => s.pts.length && s.pts[s.pts.length - 1].x > cam - 60);

    if (shake > 0) shake = Math.max(0, shake - dt * 28);
    updateParticles(dt);

    document.getElementById('score').textContent = score;
    const ib = document.getElementById('inkbar');
    ib.style.width = (ink / inkMax * 100) + '%';
    ib.classList.toggle('low', ink / inkMax < 0.25);
  }

  function updateParticles(dt) {
    for (const p of particles) { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 500 * S * dt; p.vx *= 0.95; p.life -= dt * 1.7; }
    particles = particles.filter(p => p.life > 0);
  }

  function die() {
    if (dead) return; dead = true; deadTimer = 0.7; drawing = false;
    shake = 16; beep(130, 0.4, 'sawtooth', 0.16);
    for (let i = 0; i < 26; i++) burst(runner.x, runner.y, '#6fe', 1);
  }
  function gameOver() {
    state = ST.OVER;
    const isNew = score > best;
    if (isNew) { best = score; localStorage.setItem('pathpaver_best', best); }
    document.getElementById('finalScore').textContent = score;
    document.getElementById('bestOver').textContent = best;
    document.getElementById('bestHud').textContent = '最佳 ' + best;
    document.getElementById('newBest').classList.toggle('hidden', !isNew);
    showLayer('over');
  }

  function render() {
    ctx.save();
    if (shake > 0) ctx.translate((Math.random() - .5) * shake, (Math.random() - .5) * shake);

    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#0e1626'); g.addColorStop(0.6, '#122436'); g.addColorStop(1, '#0c1a22');
    ctx.fillStyle = g; ctx.fillRect(-20, -20, W + 40, H + 40);

    // 远景网格视差
    ctx.strokeStyle = 'rgba(80,200,180,.06)'; ctx.lineWidth = 1;
    const gridOff = (cam * 0.3) % (60 * S);
    for (let x = -gridOff; x < W; x += 60 * S) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }

    ctx.translate(-cam, 0);

    // 平台
    for (const p of platforms) {
      const grd = ctx.createLinearGradient(0, p.y, 0, p.y + 60 * S);
      grd.addColorStop(0, '#2b4a55'); grd.addColorStop(1, '#16262e');
      ctx.fillStyle = grd;
      ctx.fillRect(p.x0, p.y, p.x1 - p.x0, H);
      ctx.fillStyle = '#3df0c0';
      ctx.fillRect(p.x0, p.y - 3 * S, p.x1 - p.x0, 3 * S);
    }

    // 金币
    for (const c of coins) {
      if (c.got) continue; c.ph += 0.08;
      const sc = 1 + Math.sin(c.ph) * 0.12;
      ctx.beginPath(); ctx.fillStyle = 'rgba(255,215,106,.18)';
      ctx.arc(c.x, c.y, 20 * S * sc, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.fillStyle = '#ffd76a';
      ctx.shadowColor = '#ffd76a'; ctx.shadowBlur = 14;
      ctx.arc(c.x, c.y, 8 * S, 0, 7); ctx.fill(); ctx.shadowBlur = 0;
    }

    // 画出的路
    for (const s of strokes) {
      if (s.pts.length < 2) continue;
      ctx.beginPath();
      ctx.moveTo(s.pts[0].x, s.pts[0].y);
      for (let i = 1; i < s.pts.length; i++) ctx.lineTo(s.pts[i].x, s.pts[i].y);
      ctx.strokeStyle = '#6fffd0'; ctx.lineWidth = 6 * S; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.shadowColor = '#3df0c0'; ctx.shadowBlur = 12; ctx.stroke(); ctx.shadowBlur = 0;
    }

    // 正在画的笔触末端高亮
    if (drawing && lastPt) {
      ctx.beginPath(); ctx.fillStyle = '#fff';
      ctx.arc(lastPt.x, lastPt.y, 5 * S, 0, 7); ctx.fill();
    }

    // 跑者
    drawRunner();

    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawRunner() {
    const x = runner.x, y = runner.y, r = runner.r;
    ctx.save();
    ctx.translate(x, y);
    // 影子
    // 身体
    const bob = runner.grounded ? Math.sin(runner.run) * 2 * S : 0;
    ctx.beginPath(); ctx.fillStyle = 'rgba(60,240,200,.25)';
    ctx.arc(0, -r - 4 * S + bob, r * 1.6, 0, 7); ctx.fill();
    ctx.beginPath();
    const bg = ctx.createLinearGradient(0, -r * 2, 0, 0);
    bg.addColorStop(0, '#bfffe8'); bg.addColorStop(1, '#2ee6a0');
    ctx.fillStyle = bg; ctx.shadowColor = '#2ee6a0'; ctx.shadowBlur = 16;
    ctx.arc(0, -r - 4 * S + bob, r, 0, 7); ctx.fill(); ctx.shadowBlur = 0;
    // 眼睛（朝前）
    ctx.fillStyle = '#06352a';
    ctx.beginPath(); ctx.arc(r * 0.35, -r - 5 * S + bob, r * 0.18, 0, 7); ctx.fill();
    // 腿（奔跑）
    ctx.strokeStyle = '#1aa985'; ctx.lineWidth = 3 * S; ctx.lineCap = 'round';
    const ph = runner.run;
    for (let i = 0; i < 2; i++) {
      const sw = Math.sin(ph + i * Math.PI) * (runner.grounded ? 6 * S : 2 * S);
      ctx.beginPath(); ctx.moveTo(0, -2 * S); ctx.lineTo(sw, 0); ctx.stroke();
    }
    ctx.restore();
  }

  let last = performance.now();
  function loop(now) {
    let dt = (now - last) / 1000; last = now; if (dt > 0.05) dt = 0.05;
    update(dt); render(); requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  function showLayer(id) {
    for (const l of document.querySelectorAll('.layer')) {
      if (l.id === id) { l.classList.remove('hidden'); requestAnimationFrame(() => l.classList.add('show')); }
      else { l.classList.add('hidden'); l.classList.remove('show'); }
    }
  }
  function startGame() { document.getElementById('bestHud').textContent = '最佳 ' + best; reset(); state = ST.PLAY; showLayer(''); }
  document.getElementById('startBtn').onclick = () => { actx(); startGame(); };
  document.getElementById('retryBtn').onclick = startGame;
  document.getElementById('shareBtn').onclick = async () => {
    const text = `我在《铺路狂魔》里铺了 ${score} 米的路！边跑边画路，你能撑多远？→`;
    try { if (navigator.share) await navigator.share({ title: '铺路狂魔 Path Paver', text }); else { await navigator.clipboard.writeText(text); alert('成绩已复制！'); } } catch (e) {}
  };
  document.getElementById('bestHud').textContent = '最佳 ' + best;
})();
</script>
</body>
</html>
