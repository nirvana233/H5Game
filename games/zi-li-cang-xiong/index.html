<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>字里藏凶 · 一段证词找真凶</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{ --paper:#e7d8b8; --paper2:#d8c39a; --ink:#2e2519; --ink2:#6b5a3e; --red:#9c2b22; --seal:#a8362b; }
  html,body{ height:100%; overflow:hidden; user-select:none;
    font-family:"Kaiti SC","STKaiti","KaiTi",-apple-system,"PingFang SC",serif; color:var(--ink);
    background:radial-gradient(120% 90% at 50% 0%, #efe2c5 0%, #e0cda4 55%, #cdb586 100%);
    display:flex; flex-direction:column; align-items:center; }
  body::before{ content:""; position:fixed; inset:0; pointer-events:none; opacity:.4; mix-blend-mode:multiply;
    background-image:repeating-linear-gradient(0deg, transparent 0 26px, rgba(110,90,62,.05) 26px 27px),
      radial-gradient(circle at 80% 12%, rgba(120,40,30,.06) 0 60px, transparent 60px); }
  #app{ width:100%; max-width:460px; height:100%; display:flex; flex-direction:column; padding:8px 12px env(safe-area-inset-bottom,12px); position:relative; z-index:1; }

  header{ display:flex; align-items:center; justify-content:space-between; padding:4px 2px 8px; }
  .title{ font-size:20px; font-weight:900; letter-spacing:3px; }
  .title .seal{ color:var(--seal); }
  .tools{ display:flex; gap:8px; }
  .ibtn{ width:34px; height:34px; border:1.5px solid rgba(110,90,62,.4); border-radius:9px;
    background:rgba(255,255,255,.25); font-size:15px; cursor:pointer; color:var(--ink2); }
  .ibtn:active{ transform:scale(.92); }

  #bar2{ display:flex; align-items:center; justify-content:space-between; font-size:13px; color:var(--ink2); padding:0 4px 8px; font-weight:700; letter-spacing:1px; }
  #bar2 b{ color:var(--seal); }

  /* 案情 */
  #caseTop{ background:rgba(46,37,25,.07); border:1px solid rgba(110,90,62,.3); border-left:4px solid var(--seal);
    border-radius:10px; padding:11px 14px; margin-bottom:10px; }
  #caseName{ font-size:16px; font-weight:900; letter-spacing:1px; margin-bottom:3px; }
  #caseDesc{ font-size:13.5px; color:var(--ink2); line-height:1.6; }

  /* 嫌疑人列表 */
  #suspects{ flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:9px; -webkit-overflow-scrolling:touch; padding:2px; }
  .sus{ display:flex; gap:10px; background:linear-gradient(180deg,#fbf3df,#efe1c0);
    border:1.5px solid rgba(110,90,62,.3); border-radius:14px; padding:11px 12px; cursor:pointer;
    box-shadow:0 2px 0 rgba(110,90,62,.18); transition:transform .1s, box-shadow .15s, outline .1s; }
  .sus:active{ transform:translateY(2px); }
  .sus.sel{ outline:3px solid var(--seal); outline-offset:-1px; }
  .sus .ava{ width:46px; height:46px; flex:none; border-radius:11px; background:rgba(110,90,62,.12);
    display:flex; align-items:center; justify-content:center; font-size:26px; }
  .sus .body{ flex:1; min-width:0; }
  .sus .who{ display:flex; align-items:baseline; gap:8px; margin-bottom:4px; }
  .sus .nm{ font-size:16px; font-weight:900; letter-spacing:1px; }
  .sus .role{ font-size:11.5px; color:var(--ink2); background:rgba(110,90,62,.12); padding:1px 7px; border-radius:7px; }
  .sus .say{ font-size:14px; line-height:1.55; color:var(--ink); position:relative; padding-left:18px; }
  .sus .say::before{ content:"“"; position:absolute; left:0; top:-2px; font-size:22px; color:var(--seal); font-weight:900; }
  .sus.guilty{ outline:3px solid var(--red); background:linear-gradient(180deg,#f6dcd6,#eec6bd); }
  .sus.cleared{ opacity:.55; }
  .sus .verdict{ font-size:11px; font-weight:900; margin-top:5px; }
  .sus.guilty .verdict{ color:var(--red); } .sus.cleared .verdict{ color:#4a7d58; }

  #accuseBtn{ margin-top:10px; width:100%; border:none; border-radius:14px; padding:14px; font-size:17px; font-weight:900;
    letter-spacing:3px; cursor:pointer; color:#f4ecd8; font-family:inherit;
    background:linear-gradient(180deg,#a8362b,#822017); box-shadow:0 4px 0 #621309; }
  #accuseBtn:active{ transform:translateY(3px); box-shadow:0 1px 0 #621309; }
  #accuseBtn:disabled{ opacity:.4; }
  .hidden{ display:none !important; }

  /* 弹窗 */
  .overlay{ position:fixed; inset:0; z-index:99; display:flex; align-items:center; justify-content:center; padding:24px;
    background:rgba(46,37,25,.6); backdrop-filter:blur(4px); }
  .card{ background:linear-gradient(180deg,#f6ecd2,#e7d6b0); border:1px solid rgba(110,90,62,.5);
    border-radius:20px; padding:24px 22px; max-width:350px; width:100%; text-align:center;
    box-shadow:0 18px 50px rgba(0,0,0,.4); animation:pop .35s cubic-bezier(.3,1.4,.5,1); max-height:88vh; overflow-y:auto; }
  @keyframes pop{ from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }
  .card .big{ font-size:50px; line-height:1; margin-bottom:8px; }
  .card h1{ font-size:24px; letter-spacing:3px; margin-bottom:8px; } .card h1 .seal{ color:var(--seal); }
  .card .sub{ font-size:14px; color:var(--ink2); line-height:1.8; margin-bottom:16px; }
  .reason{ background:rgba(46,37,25,.08); border-radius:13px; padding:13px 15px; font-size:14px; line-height:1.85;
    text-align:left; color:var(--ink); margin-bottom:16px; }
  .reason b{ color:var(--seal); }
  .btn{ display:block; width:100%; border:none; border-radius:13px; padding:13px; font-size:17px; font-weight:900; cursor:pointer;
    margin-top:10px; color:#f4ecd8; letter-spacing:2px; font-family:inherit;
    background:linear-gradient(180deg,#a8362b,#822017); box-shadow:0 4px 0 #621309; }
  .btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #621309; }
  .btn.ghost{ background:linear-gradient(180deg,#e3d4b0,#cdb98c); box-shadow:0 4px 0 #a8946a; color:var(--ink); }
  .btn.ghost:active{ box-shadow:0 1px 0 #a8946a; }
  .modes{ display:flex; flex-direction:column; gap:10px; margin:8px 0 4px; }
  .hintbox{ background:rgba(46,37,25,.08); border-radius:13px; padding:13px 15px; font-size:13.5px; line-height:1.9;
    text-align:left; color:var(--ink2); margin-bottom:16px; } .hintbox b{ color:var(--seal); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="title">字里<span class="seal">藏凶</span></div>
    <div class="tools">
      <button class="ibtn" id="menuBtn" title="菜单">☰</button>
      <button class="ibtn" id="muteBtn" title="静音">🔊</button>
      <button class="ibtn" id="helpBtn" title="玩法">？</button>
    </div>
  </header>

  <div id="bar2">
    <span id="caseLabel">—</span>
    <span>⏱ <b id="timer">0″</b> &nbsp; 连破 <b id="streak">0</b></span>
  </div>

  <div id="caseTop">
    <div id="caseName">案情</div>
    <div id="caseDesc"></div>
  </div>

  <div id="suspects"></div>

  <button id="accuseBtn" disabled>🔍 选 一 人 指 认</button>
</div>

<!-- 主菜单 -->
<div class="overlay" id="menuOverlay">
  <div class="card">
    <div class="big">🕵️</div>
    <h1>字里<span class="seal">藏凶</span></h1>
    <div class="sub">真凶必说谎，其余皆诚实。<br>读懂每句证词，揪出唯一的说谎者。</div>
    <div class="modes">
      <button class="btn" id="dailyBtn">📅 每日疑案</button>
      <button class="btn ghost" id="endlessBtn">♾️ 无尽推理</button>
    </div>
    <div class="hintbox" style="margin-top:14px">
      🧩 每桩案子<b>有且仅有一个</b>逻辑上说得通的真凶<br>
      🗣️ <b>清白者句句属实，真凶句句是假</b><br>
      👉 点嫌疑人选中，再按下方按钮指认<br>
      ✅ 指认错了？会告诉你错在哪句话的矛盾
    </div>
  </div>
</div>

<!-- 结果 -->
<div class="overlay hidden" id="resultOverlay">
  <div class="card">
    <div class="big" id="resEmoji">🎉</div>
    <h1 id="resTitle">真相大白</h1>
    <div class="sub" id="resSub"></div>
    <div class="reason" id="resReason"></div>
    <button class="btn" id="resPrimary">下一桩 →</button>
    <button class="btn ghost" id="resShare">📤 晒出我的推理</button>
    <button class="btn ghost" id="resMenu">返回菜单</button>
  </div>
</div>

<script>
/* ===================== 可重复随机源（每日同题）===================== */
function mulberry32(a){ return function(){ a|=0; a=(a+0x6D2B79F5)|0; let t=Math.imul(a^(a>>>15),1|a);
  t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
let R = mulberry32((Math.random()*1e9)|0);
const rnd  = ()=> R();
const rint = m => Math.floor(R()*m);
function pickExcept(n, excl){ let x; do{ x=rint(n); }while(excl.includes(x)); return x; }
function pickTwoExcept(n, excl){ const a=pickExcept(n,excl); const b=pickExcept(n,excl.concat(a)); return [a,b]; }
function shufPair(a,b){ return rnd()<0.5 ? [a,b] : [b,a]; }

/* ===================== 命题逻辑：在“凶手=h”假设下求真值 =====================
   accuse(x): 凶手是 x          → h===x
   clear(x):  x 是清白的         → h!==x   （x===自己即“我清白”）
   pairOne(a,b): a、b 中有凶手    → h===a || h===b
   pairNone(a,b):a、b 都清白      → h!==a && h!==b                             */
function evalStmt(s, h){
  switch(s.t){
    case 'accuse':   return h===s.a[0];
    case 'clear':    return h!==s.a[0];
    case 'pairOne':  return h===s.a[0] || h===s.a[1];
    case 'pairNone': return h!==s.a[0] && h!==s.a[1];
  }
}
/* 为嫌疑人 i 造一句证词，使其在“真凶=g”下的真值 == (i!==g) */
function genStmt(i, g, n){
  const want = (i !== g);                 // 清白者说真话(true)，真凶说假话(false)
  const types = ['accuse','clear','self','pairOne','pairNone'];
  for(let k=0;k<60;k++){
    const ty = types[rint(types.length)];
    let s = null;
    if(ty==='self')      s = {t:'clear', a:[i]};                                  // “我是清白的”
    else if(ty==='accuse'){ const x = want ? g : pickExcept(n,[g]); s={t:'accuse',a:[x]}; }
    else if(ty==='clear'){  const x = want ? pickExcept(n,[g]) : g; s={t:'clear',a:[x]}; }
    else if(ty==='pairOne'){ let a,b; if(want){a=g;b=pickExcept(n,[g]);}else{[a,b]=pickTwoExcept(n,[g]);} s={t:'pairOne',a:shufPair(a,b)}; }
    else if(ty==='pairNone'){ let a,b; if(want){[a,b]=pickTwoExcept(n,[g]);}else{a=g;b=pickExcept(n,[g]);} s={t:'pairNone',a:shufPair(a,b)}; }
    if(s && evalStmt(s,g)===want) return s;
  }
  return {t:'clear', a:[i]};               // 兜底：“我清白”恒满足约束
}
/* 唯一解校验：恰好一个 h 能让“真凶说谎、其余说真话”全部自洽 */
function uniqueCulprit(stmts, n){
  let sols=[];
  for(let h=0;h<n;h++){
    let ok=true;
    for(let i=0;i<n;i++){ if(evalStmt(stmts[i],h) !== (i!==h)){ ok=false; break; } }
    if(ok) sols.push(h);
  }
  return sols.length===1 ? sols[0] : -1;
}
/* 生成一桩保证唯一解的案件 */
function genCase(n){
  for(let attempt=0; attempt<400; attempt++){
    const g = rint(n);
    const stmts = []; for(let i=0;i<n;i++) stmts.push(genStmt(i,g,n));
    if(uniqueCulprit(stmts,n) === g) return {n, g, stmts};
  }
  // 极端兜底：构造平凡唯一解
  const g = rint(n); const stmts=[];
  for(let i=0;i<n;i++) stmts.push(i===g ? {t:'clear',a:[g]} : {t:'accuse',a:[g]});
  return {n, g, stmts};
}

/* ===================== 证词中文化 & 矛盾解释 ===================== */
function stmtText(s, i, names){
  switch(s.t){
    case 'accuse':   return `凶手就是${names[s.a[0]]}，我看得清清楚楚。`;
    case 'clear':    return s.a[0]===i ? `我是清白的，绝不是我干的。` : `${names[s.a[0]]}是清白的，与这案子无关。`;
    case 'pairOne':  return `${names[s.a[0]]}和${names[s.a[1]]}两人里，必有一个是凶手。`;
    case 'pairNone': return `${names[s.a[0]]}和${names[s.a[1]]}都是清白的，我担保。`;
  }
}
// 玩家指认 h 后，找出第一处逻辑矛盾并解释
function contradiction(stmts, h, names){
  for(let i=0;i<stmts.length;i++){
    const truth = evalStmt(stmts[i], h);
    const should = (i!==h);          // 该说真(true)还是假(false)
    if(truth !== should){
      const say = `「${stmtText(stmts[i], i, names)}」`;
      if(i===h){
        return `若 <b>${names[h]}</b> 是凶手，TA 该满口谎言。可 TA 这句 ${say}，在此情形下偏偏<b>是真话</b>——真凶怎会说真话？矛盾。`;
      } else {
        return `若 <b>${names[h]}</b> 是凶手，那 <b>${names[i]}</b> 就是清白的、句句属实。可 TA 这句 ${say}，此时却<b>是假话</b>——清白者岂会说谎？矛盾。`;
      }
    }
  }
  return '此处推断自相矛盾。';
}

/* ===================== flavor 素材 ===================== */
const SURNAMES = '赵钱孙李周吴郑王冯陈褚卫蒋沈韩杨秦尤许何吕施张孔曹严华金魏陶姜'.split('');
const GIVEN = ['二','小乙','阿福','三','大牛','阿巧','黑子','阿青','老幺','阿满','石头','阿香','长贵','阿水','铁柱','阿莲'];
const ROLES = ['账房','厨子','园丁','车夫','货郎','绣娘','船工','郎中','管家','学徒','更夫','茶博士','屠户','戏子','镖师','船娘'];
const AVA = ['🧑‍🦱','👨‍🦰','🧔','👩','👴','👵','🧑','👨','👩‍🦰','🧓','👨‍🦳','👩‍🦳'];
const CASES = [
  ['翡翠镯失窃案','深夜，老夫人床头的翡翠镯不翼而飞，窗下只留半枚泥脚印。'],
  ['后院投毒案','管家的参茶被人下了药，幸而只是泻药。下毒者，就在这几人之中。'],
  ['账本失火案','一本要命的账册在柴房烧成了灰，火是有人故意点的。'],
  ['祠堂金佛案','供奉百年的鎏金小佛，在上香的间隙凭空消失。'],
  ['粮仓鼠患案','官粮被人凿洞偷运，却嫁祸给了老鼠。监守自盗者是谁？'],
  ['喜宴下泻案','东家嫁女的喜宴上，半席宾客上吐下泻，分明有人做了手脚。'],
  ['古画调包案','悬了三代的真迹，被人换成了赝品，真品已悄悄出府。'],
  ['深夜纵火案','马厩半夜起火，惊马踏伤了人。火源处，遗落一只眼熟的火折子。'],
];

/* ===================== 案件状态 ===================== */
let cur=null, names=[], roles=[], avas=[], selected=-1;
let mode='endless', caseIndex=0, streak=0, t0=0, timerId=null, solved=false;
let muted=false;
const bestKey='zlcx_best_v1';
let best = +(localStorage.getItem(bestKey)||0);
const dailyKey = ()=> 'zlcx_daily_'+todaySeed();
function todaySeed(){ const d=new Date(); return d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate(); }

function buildCase(n, seed){
  if(seed!=null) R = mulberry32(seed); else R = mulberry32((Math.random()*1e9)|0);
  cur = genCase(n);
  // 角色 flavor（不重复）
  names=[]; roles=[]; avas=[];
  const usedNm=new Set(), usedRole=new Set();
  for(let i=0;i<n;i++){
    let nm; do{ nm = SURNAMES[rint(SURNAMES.length)] + GIVEN[rint(GIVEN.length)]; }while(usedNm.has(nm)); usedNm.add(nm); names.push(nm);
    let ro; do{ ro = ROLES[rint(ROLES.length)]; }while(usedRole.has(ro)); usedRole.add(ro); roles.push(ro);
    avas.push(AVA[rint(AVA.length)]);
  }
  cur.case = CASES[rint(CASES.length)];
  selected=-1; solved=false;
  renderCase();
  startTimer();
}

function renderCase(){
  document.getElementById('caseName').textContent = cur.case[0];
  document.getElementById('caseDesc').textContent = cur.case[1] + `（${cur.n} 名嫌疑人，真凶仅一人）`;
  document.getElementById('caseLabel').textContent = mode==='daily'
    ? `每日疑案 · ${todaySeed()}` : `无尽推理 · 第 ${caseIndex+1} 桩`;
  document.getElementById('streak').textContent = streak;
  const box=document.getElementById('suspects'); box.innerHTML='';
  for(let i=0;i<cur.n;i++){
    const el=document.createElement('div'); el.className='sus'; el.dataset.i=i;
    el.innerHTML=`<div class="ava">${avas[i]}</div><div class="body">
      <div class="who"><span class="nm">${names[i]}</span><span class="role">${roles[i]}</span></div>
      <div class="say">${stmtText(cur.stmts[i], i, names)}</div>
      <div class="verdict"></div></div>`;
    el.onclick=()=> selectSus(i);
    box.appendChild(el);
  }
  const ab=document.getElementById('accuseBtn');
  ab.disabled=true; ab.textContent='🔍 选 一 人 指 认';
}

function selectSus(i){
  if(solved) return;
  selected=i;
  document.querySelectorAll('.sus').forEach(el=> el.classList.toggle('sel', +el.dataset.i===i));
  const ab=document.getElementById('accuseBtn');
  ab.disabled=false; ab.textContent=`🔍 指认「${names[i]}」是真凶`;
  beep(440);
}

/* ===================== 计时 ===================== */
function startTimer(){ t0=Date.now(); clearInterval(timerId);
  timerId=setInterval(()=>{ document.getElementById('timer').textContent=elapsed()+'″'; }, 200); }
function elapsed(){ return Math.floor((Date.now()-t0)/1000); }
function stopTimer(){ clearInterval(timerId); }

/* ===================== 指认判定 ===================== */
function accuse(){
  if(solved || selected<0) return;
  const sec=elapsed(); stopTimer(); solved=true;
  const correct = (selected === cur.g);
  // 标注真凶/清白
  document.querySelectorAll('.sus').forEach(el=>{
    const i=+el.dataset.i; el.classList.remove('sel'); el.onclick=null;
    if(i===cur.g){ el.classList.add('guilty'); el.querySelector('.verdict').textContent='✗ 真凶 · 此话为假'; }
    else { el.classList.add('cleared'); el.querySelector('.verdict').textContent='✓ 清白 · 所言属实'; }
  });
  document.getElementById('accuseBtn').disabled=true;

  if(correct){
    beep(880); setTimeout(()=>beep(1175),100);
    if(mode==='endless'){ streak++; if(streak>best){ best=streak; localStorage.setItem(bestKey,best); } }
    if(mode==='daily'){ try{ localStorage.setItem(dailyKey(), JSON.stringify({done:true,sec})); }catch(_){}
    }
    showResult(true, sec);
  } else {
    beep(160);
    showResult(false, sec);
  }
}

function showResult(correct, sec){
  const e=document.getElementById('resEmoji'), t=document.getElementById('resTitle'),
        sub=document.getElementById('resSub'), rs=document.getElementById('resReason'),
        pr=document.getElementById('resPrimary');
  if(correct){
    e.textContent='🎉'; t.innerHTML='真相<span class="seal">大白</span>';
    sub.innerHTML = (mode==='endless'
        ? `连破 <b style="color:var(--seal)">${streak}</b> 桩 · 历史最佳 <b>${best}</b>`
        : `用时 <b style="color:var(--seal)">${sec}″</b> · 每日疑案达成`);
    rs.innerHTML = `真凶是 <b>${names[cur.g]}</b>。<br>唯有认定 TA 说谎、其余人句句属实，全场证词才彼此<b>毫无矛盾</b>——这是唯一说得通的解。`;
    pr.textContent = mode==='endless' ? '下一桩 →' : '再看一遍';
    pr.onclick = mode==='endless' ? nextEndless : ()=>document.getElementById('resultOverlay').classList.add('hidden');
  } else {
    e.textContent='❌'; t.innerHTML='<span class="seal">推理有误</span>';
    sub.innerHTML = `真凶其实是 <b>${names[cur.g]}</b>。`;
    rs.innerHTML = contradiction(cur.stmts, selected, names);
    if(mode==='endless'){ streak=0; pr.textContent='重新开始'; pr.onclick=startEndless; }
    else { pr.textContent='换日再战'; pr.onclick=()=>document.getElementById('resultOverlay').classList.add('hidden'); }
  }
  document.getElementById('resultOverlay').classList.remove('hidden');
}

/* ===================== 模式流程 ===================== */
function nFor(idx){ return 3 + Math.min(3, Math.floor(idx/2)); }   // 3,3,4,4,5,5,6,6...
function startEndless(){
  mode='endless'; caseIndex=0; streak=0;
  document.getElementById('resultOverlay').classList.add('hidden');
  document.getElementById('menuOverlay').classList.add('hidden');
  buildCase(nFor(0), null);
}
function nextEndless(){
  caseIndex++;
  document.getElementById('resultOverlay').classList.add('hidden');
  buildCase(nFor(caseIndex), null);
}
function startDaily(){
  mode='daily';
  document.getElementById('resultOverlay').classList.add('hidden');
  document.getElementById('menuOverlay').classList.add('hidden');
  // 当日题目大小在 4~5 间，由日期决定；同一天同题
  const n = 4 + (todaySeed()%2);
  buildCase(n, todaySeed());
  // 已完成提示
  try{ const rec=JSON.parse(localStorage.getItem(dailyKey())); if(rec&&rec.done){ setTimeout(()=>{
    document.getElementById('caseDesc').textContent += ` ✅ 今日已破（${rec.sec}″），可再练手。`; },50); } }catch(_){}
}

/* ===================== 分享 ===================== */
function share(){
  const ok = document.getElementById('resTitle').textContent.indexOf('大白')>=0;
  let txt;
  if(mode==='daily') txt=`我破了《字里藏凶》今日疑案，用时 ${elapsed()||'？'}″！\n真凶必说谎，其余皆诚实——你能多快揪出 TA？`;
  else txt=`我在《字里藏凶》连破 ${streak} 桩疑案（最佳 ${best}）！\n一段证词找真凶，纯逻辑推理。你能连破几桩？`;
  if(navigator.share){ navigator.share({title:'字里藏凶', text:txt, url:location.href}).catch(()=>{}); }
  else{ navigator.clipboard?.writeText(txt+' '+location.href); alert('战绩已复制，去分享吧！\n\n'+txt); }
}

/* ===================== 音效 ===================== */
let actx;
function beep(freq){ if(muted) return;
  try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain(); o.frequency.value=freq; o.type='triangle';
    o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(0.06,actx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+0.2);
    o.start(); o.stop(actx.currentTime+0.22);
  }catch(e){}
}

/* ===================== 绑定 ===================== */
document.getElementById('accuseBtn').onclick=accuse;
document.getElementById('dailyBtn').onclick=startDaily;
document.getElementById('endlessBtn').onclick=startEndless;
document.getElementById('menuBtn').onclick=()=>{ stopTimer(); document.getElementById('menuOverlay').classList.remove('hidden'); };
document.getElementById('helpBtn').onclick=()=>document.getElementById('menuOverlay').classList.remove('hidden');
document.getElementById('resShare').onclick=share;
document.getElementById('resMenu').onclick=()=>{ document.getElementById('resultOverlay').classList.add('hidden'); document.getElementById('menuOverlay').classList.remove('hidden'); };
document.getElementById('muteBtn').onclick=e=>{ muted=!muted; e.target.textContent=muted?'🔇':'🔊'; };
</script>
