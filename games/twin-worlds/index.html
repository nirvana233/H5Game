<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e1230">
<title>双生世界 · Twin Worlds</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0e1230; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; touch-action: none; }
  #game { display: block; width: 100vw; height: 100vh; }

  /* 移动端虚拟按键 */
  #touch { position: fixed; inset: 0; pointer-events: none; z-index: 10; display: none; }
  #touch.on { display: block; }
  .btn {
    position: absolute; pointer-events: auto; user-select: none;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; color: #fff; font-size: 30px; font-weight: 700;
    background: rgba(255,255,255,0.10); border: 2px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    transition: transform .05s, background .05s;
  }
  .btn:active, .btn.press { transform: scale(0.92); background: rgba(255,255,255,0.28); }
  #bLeft  { left: 22px;  bottom: 30px;  width: 76px; height: 76px; }
  #bRight { left: 116px; bottom: 30px;  width: 76px; height: 76px; }
  #bJump  { right: 22px; bottom: 30px;  width: 92px; height: 92px;
            background: rgba(120,230,255,0.16); border-color: rgba(120,230,255,0.5); }
  #bSwap  { right: 122px; bottom: 78px; width: 96px; height: 96px;
            background: rgba(255,210,90,0.18); border-color: rgba(255,210,90,0.6);
            font-size: 26px; }
  #hintRot { position: fixed; inset: 0; display: none; }

  /* 玩法说明按钮（始终可见，右上角，避开左上 HUD 与底部虚拟键） */
  #bHelp {
    position: fixed; top: 12px; right: 12px; z-index: 20;
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800; color: #fff; cursor: pointer;
    background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    -webkit-tap-highlight-color: transparent; user-select: none;
    transition: transform .05s, background .05s;
  }
  #bHelp:active, #bHelp.press { transform: scale(0.9); background: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="touch">
  <div class="btn" id="bLeft">◀</div>
  <div class="btn" id="bRight">▶</div>
  <div class="btn" id="bJump">↑</div>
  <div class="btn" id="bSwap">切换</div>
</div>
<button id="bHelp" title="玩法说明">?</button>

<script>
"use strict";
/* ============================================================
   双生世界 (Twin Worlds) — 横版双世界切换平台跳跃
   纯 Vanilla JS + Canvas，单文件零依赖
   核心机制：一键瞬间切换「光明 / 黑暗」两个重叠世界，
   只有当前世界的平台是实体，另一个世界以幽灵轮廓显示。
   ============================================================ */

// ---------- 常量 ----------
const TILE = 48;                 // 逻辑瓦片像素
const DESIRED_COLS = 16;         // 横向至少可见列数（保证预判空间）
const DESIRED_ROWS = 12;         // 纵向至少可见行数
const GRAVITY = 2600;
const MOVE_SPEED = 305;
const ACCEL_GROUND = 2600, ACCEL_AIR = 1900, FRICTION = 3000;
const JUMP_V = -990;             // 跳跃初速 → 峰高约 3.8 格
const MAX_FALL = 1250;
const COYOTE = 0.09;             // 离地后仍可起跳的宽限
const JUMP_BUFFER = 0.10;        // 落地前预输入缓冲
const JUMP_CUT = 0.45;           // 松手切顶 → 可变跳跃高度
const PW = 30, PH = 42;          // 玩家碰撞盒
const STEP = 1 / 120;            // 固定步长物理
const LIGHT = 0, DARK = 1;

// 配色
const COL = {
  lightBgTop: '#fcefd0', lightBgBot: '#f6d79a',
  darkBgTop:  '#0c1030', darkBgBot:  '#221a4a',
  both:  '#7b8499',  bothEdge: '#aab2c4',
  light: '#f5c542',  lightEdge: '#ffe49a',
  dark:  '#3fdcf0',  darkEdge:  '#bff4fb',
  spike: '#ff5a6e',
  orb:   '#ffd95e',
};

// ---------- 关卡数据 ----------
// 图例: #=双世界实体  L=仅光明  D=仅黑暗  ^=尖刺(双世界致命)
//       o=宝石  C=检查点  S=出生点  G=终点旗  空格=空
const LEVELS = [
  { // 关卡 1 — 初识切换
    name: "初识切换",
    rows: [
      "                                ",
      "                                ",
      "                                ",
      "                                ",
      "                                ",
      "                                ",
      "                                ",
      "                                ",
      "                                ",
      "                                ",
      "          o          o          ",
      "          o          o          ",
      " S               C          G   ",
      "######  #####LLL#####DDDD#######",
      "######  #####LLL#####DDDD#######",
    ]
  },
  { // 关卡 2 — 空中交替切换
    name: "空中交替",
    rows: [
      "                                           ",
      "                                           ",
      "                                           ",
      "                                           ",
      "                                           ",
      "                                           ",
      "                                           ",
      "                                           ",
      "                                           ",
      "                                           ",
      "                                           ",
      "        o      o          o        o       ",
      "  S                        C  ^         G  ",
      "#####  LLL  DDD  LLL  DDD  ######  LLLL ######",
      "#####  LLL  DDD  LLL  DDD  ######  LLLL ######",
    ]
  },
  { // 关卡 3 — 深渊连切
    name: "深渊连切",
    rows: [
      "                                           ",
      "                                           ",
      "                                           ",
      "                                           ",
      "                                           ",
      "                                           ",
      "                                           ",
      "                                           ",
      "                                           ",
      "        o    o    o    o    o              ",
      "                                           ",
      "       LLL  DDD  LLL  DDD  LLL              ",
      " S  C                                  G   ",
      "######                         ############",
      "######                         ############",
    ]
  },
  { // 关卡 4 — 双色登塔（垂直·2格间距，逐层切换攀登）
    name: "双色登塔",
    rows: [
      "                ",
      "                ",
      "                ",
      "      G         ",
      "  ##########    ",
      "     o          ",
      "   LLLL         ",
      "       o        ",
      "     DDDD       ",
      "     o          ",
      "   LLLL         ",
      "       o        ",
      "     DDDD       ",
      "     o          ",
      "   LLLL         ",
      "  S C           ",
      "################",
      "################",
    ]
  },
  { // 关卡 5 — 终章·全功 gauntlet
    name: "终章 · 全功",
    rows: [
      "                                                        ",
      "                                                        ",
      "                                                        ",
      "                                                        ",
      "                                                        ",
      "                                                        ",
      "                                                        ",
      "                                                        ",
      "                                                        ",
      "                                                        ",
      "                                                        ",
      "        o    o            o    o          o    o        ",
      "  S                ^               C                 G  ",
      "#####  LLL  DDD  ######  LLL  DDD  ######  LLL  DDD  #######",
      "#####  LLL  DDD  ######  LLL  DDD  ######  LLL  DDD  #######",
    ]
  },
];

// ---------- 画布 ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, dpr = 1, scale = 1, viewW = 0, viewH = 0;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W * dpr); canvas.height = Math.floor(H * dpr);
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // 同时保证横向≥DESIRED_COLS、纵向≥DESIRED_ROWS 可见
  scale = Math.min(W / (DESIRED_COLS * TILE), H / (DESIRED_ROWS * TILE));
  viewW = W / scale; viewH = H / scale;
}
window.addEventListener('resize', resize);
resize();

// ---------- 音频（WebAudio 程序合成，零文件） ----------
let actx = null;
function audioReady() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (actx && actx.state === 'suspended') actx.resume();
}
function blip(freq, dur, type, vol, slideTo) {
  if (!actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol || 0.2, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(actx.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
const sfx = {
  jump:  () => blip(440, 0.14, 'square', 0.16, 760),
  swap:  () => { blip(300, 0.12, 'sawtooth', 0.14, 620); blip(900, 0.10, 'sine', 0.10, 480); },
  land:  () => blip(180, 0.06, 'sine', 0.10, 120),
  orb:   () => { blip(880, 0.10, 'sine', 0.16, 1320); },
  cp:    () => { blip(520, 0.12, 'triangle', 0.16, 780); setTimeout(()=>blip(780,0.12,'triangle',0.14,1040),90); },
  death: () => { blip(260, 0.28, 'sawtooth', 0.18, 70); },
  clear: () => { [523,659,784,1046].forEach((f,i)=>setTimeout(()=>blip(f,0.18,'triangle',0.16,f*1.02),i*110)); },
  win:   () => { [523,659,784,1046,784,1046,1318].forEach((f,i)=>setTimeout(()=>blip(f,0.22,'triangle',0.16,f*1.02),i*130)); },
};

// ---------- 游戏状态 ----------
let state = 'title';          // title | play | clear | win
let showHelp = false;         // 玩法说明浮层是否打开（打开时暂停物理）
let world = LIGHT;
let grid = [], cols = 0, rows = 0, levelW = 0, levelH = 0;
let spawn = { x: 0, y: 0 }, goal = null, checkpoints = [], orbs = [], spikes = [];
let activeCP = null;
let levelIndex = 0, levelTime = 0, levelDeaths = 0;
let run = { time: 0, deaths: 0, orbs: 0, total: 0 };
let best = loadBest();
const player = { x: 0, y: 0, vx: 0, vy: 0, onGround: false, coyote: 0, jbuf: 0, jumpHeld: false, facing: 1, alive: true, respawn: 0, anim: 0 };

// 特效
let cam = { x: 0, y: 0 };
let hitstop = 0, shake = 0, flash = 0, flashCol = '#fff';
let particles = [];
let swapPulse = 0;            // 切换后世界整体脉冲(用于平台高亮)
let hintAlpha = 0;           // 首关提示

// 输入
const input = { left: false, right: false };
let pendingSwap = false;

// ---------- 存档 ----------
function loadBest() { try { return JSON.parse(localStorage.getItem('twinworlds_best') || '{}'); } catch (e) { return {}; } }
function saveBest() { try { localStorage.setItem('twinworlds_best', JSON.stringify(best)); } catch (e) {} }

// ---------- 关卡解析 ----------
function loadLevel(idx) {
  const def = LEVELS[idx];
  const raw = def.rows;
  cols = raw.reduce((m, r) => Math.max(m, r.length), 0);
  rows = raw.length;
  levelW = cols * TILE; levelH = rows * TILE;
  grid = []; checkpoints = []; orbs = []; spikes = []; goal = null;
  for (let r = 0; r < rows; r++) {
    const line = raw[r].padEnd(cols, ' ');
    const row = [];
    for (let c = 0; c < cols; c++) {
      const ch = line[c];
      if (ch === 'S') { spawn = { x: c * TILE + (TILE - PW) / 2, y: r * TILE + (TILE - PH) }; row.push(' '); }
      else if (ch === 'G') { goal = { x: c * TILE, y: r * TILE }; row.push(' '); }
      else if (ch === 'C') { checkpoints.push({ x: c * TILE, y: r * TILE }); row.push(' '); }
      else if (ch === 'o') { orbs.push({ x: c * TILE + TILE / 2, y: r * TILE + TILE / 2, taken: false }); row.push(' '); }
      else if (ch === '^') { spikes.push({ x: c * TILE, y: r * TILE }); row.push(' '); }
      else if (ch === '#' || ch === 'L' || ch === 'D') row.push(ch);
      else row.push(' ');
    }
    grid.push(row);
  }
}

function startLevel(idx) {
  levelIndex = idx;
  loadLevel(idx);
  activeCP = null;
  levelTime = 0; levelDeaths = 0;
  world = LIGHT;
  respawnPlayer(true);
  hintAlpha = (idx === 0) ? 1 : 0;
  state = 'play';
}

function respawnPlayer(snap) {
  const p = activeCP ? { x: activeCP.x + (TILE - PW) / 2, y: activeCP.y + (TILE - PH) } : spawn;
  player.x = p.x; player.y = p.y;
  player.vx = 0; player.vy = 0; player.onGround = false;
  player.coyote = 0; player.jbuf = 0; player.alive = true; player.respawn = 0;
  world = LIGHT;
  if (snap) { cam.x = clamp(player.x + PW / 2 - viewW / 2, 0, Math.max(0, levelW - viewW)); cam.y = clamp(player.y + PH / 2 - viewH / 2, 0, Math.max(0, levelH - viewH)); }
}

// ---------- 工具 ----------
function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
function tileSolid(ch, w) { return ch === '#' || (ch === 'L' && w === LIGHT) || (ch === 'D' && w === DARK); }
function solidAt(c, r, w) {
  if (c < 0 || c >= cols) return true;          // 左右出界=墙
  if (r < 0) return false;                       // 顶部出界=空
  if (r >= rows) return false;                   // 底部出界=空(坠落)
  return tileSolid(grid[r][c], w === undefined ? world : w);
}
function aabbOverlapsSolid(x, y, w, world_) {
  const c0 = Math.floor(x / TILE), c1 = Math.floor((x + PW - 1) / TILE);
  const r0 = Math.floor(y / TILE), r1 = Math.floor((y + PH - 1) / TILE);
  for (let r = r0; r <= r1; r++) for (let c = c0; c <= c1; c++) if (solidAt(c, r, world_)) return true;
  return false;
}

// ---------- 切换 ----------
function doSwap() {
  if (state !== 'play' || !player.alive) return;
  const target = world === LIGHT ? DARK : LIGHT;
  // 挤压处理：若切换后玩家嵌入实体，优先向上顶出，顶不出再判死
  if (aabbOverlapsSolid(player.x, player.y, 0, target)) {
    let pushed = 0; const maxPush = TILE * 1.6; let ny = player.y;
    while (pushed < maxPush && aabbOverlapsSolid(player.x, ny, 0, target)) { ny -= 3; pushed += 3; }
    if (aabbOverlapsSolid(player.x, ny, 0, target)) { world = target; kill('crush'); return; }
    player.y = ny; player.vy = Math.min(player.vy, 0);
  }
  world = target;
  swapPulse = 1; flash = 0.18; flashCol = world === LIGHT ? '#fff6e0' : '#9ce8ff';
  hitstop = 0.05; shake = Math.max(shake, 5);
  spawnParticles(player.x + PW / 2, player.y + PH / 2, 14, world === LIGHT ? COL.light : COL.dark, 230);
  sfx.swap();
}

// ---------- 死亡 / 重生 ----------
let deathCause = '';
function kill(cause) {
  if (!player.alive) return;
  player.alive = false; player.respawn = 0.7; deathCause = cause || 'fall';
  levelDeaths++; run.deaths++;
  shake = 14; flash = 0.35; flashCol = '#ff506a';
  spawnParticles(player.x + PW / 2, player.y + PH / 2, 26, '#ff7a8c', 360);
  sfx.death();
}

// ---------- 粒子 ----------
function spawnParticles(x, y, n, color, spd) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = (0.4 + Math.random() * 0.6) * (spd || 200);
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 60, life: 0.5 + Math.random() * 0.4, max: 0.9, size: 2 + Math.random() * 4, color, grav: 900 });
  }
}

// ---------- 物理步进 ----------
function physics(h) {
  if (!player.alive) { player.respawn -= h; if (player.respawn <= 0) respawnPlayer(false); return; }
  levelTime += h;

  // 水平加速 / 摩擦
  const dir = (input.left ? -1 : 0) + (input.right ? 1 : 0);
  const accel = player.onGround ? ACCEL_GROUND : ACCEL_AIR;
  if (dir !== 0) { player.vx += dir * accel * h; player.facing = dir; player.vx = clamp(player.vx, -MOVE_SPEED, MOVE_SPEED); }
  else if (player.onGround) { const f = FRICTION * h; player.vx = Math.abs(player.vx) <= f ? 0 : player.vx - Math.sign(player.vx) * f; }

  // 跳跃缓冲 + coyote
  player.coyote = player.onGround ? COYOTE : Math.max(0, player.coyote - h);
  player.jbuf = Math.max(0, player.jbuf - h);
  if (player.jbuf > 0 && player.coyote > 0) {
    player.vy = JUMP_V; player.onGround = false; player.coyote = 0; player.jbuf = 0;
    spawnParticles(player.x + PW / 2, player.y + PH, 6, '#ffffff', 120); sfx.jump();
  }
  if (!player.jumpHeld && player.vy < 0) player.vy *= Math.pow(JUMP_CUT, h * 60); // 松手切顶

  // 重力
  player.vy = Math.min(player.vy + GRAVITY * h, MAX_FALL);

  // 水平移动 + 碰撞
  player.x += player.vx * h;
  if (player.vx > 0) {
    const c = Math.floor((player.x + PW - 1) / TILE);
    const r0 = Math.floor(player.y / TILE), r1 = Math.floor((player.y + PH - 1) / TILE);
    for (let r = r0; r <= r1; r++) if (solidAt(c, r)) { player.x = c * TILE - PW; player.vx = 0; break; }
  } else if (player.vx < 0) {
    const c = Math.floor(player.x / TILE);
    const r0 = Math.floor(player.y / TILE), r1 = Math.floor((player.y + PH - 1) / TILE);
    for (let r = r0; r <= r1; r++) if (solidAt(c, r)) { player.x = (c + 1) * TILE; player.vx = 0; break; }
  }

  // 垂直移动 + 碰撞
  const wasAir = !player.onGround;
  player.onGround = false;
  player.y += player.vy * h;
  if (player.vy > 0) {
    const r = Math.floor((player.y + PH - 1) / TILE);
    const c0 = Math.floor(player.x / TILE), c1 = Math.floor((player.x + PW - 1) / TILE);
    for (let c = c0; c <= c1; c++) if (solidAt(c, r)) {
      player.y = r * TILE - PH; player.vy = 0; player.onGround = true;
      if (wasAir) { spawnParticles(player.x + PW / 2, player.y + PH, 5, '#ffffff', 90); sfx.land(); }
      break;
    }
  } else if (player.vy < 0) {
    const r = Math.floor(player.y / TILE);
    const c0 = Math.floor(player.x / TILE), c1 = Math.floor((player.x + PW - 1) / TILE);
    for (let c = c0; c <= c1; c++) if (solidAt(c, r)) { player.y = (r + 1) * TILE; player.vy = 0; break; }
  }

  // 坠落致死
  if (player.y > levelH + TILE * 2) { kill('fall'); return; }

  // 尖刺（内缩判定，公平一点）
  for (const s of spikes) {
    if (player.x + PW - 6 > s.x + 8 && player.x + 6 < s.x + TILE - 8 &&
        player.y + PH - 4 > s.y + 14 && player.y + 4 < s.y + TILE) { kill('spike'); return; }
  }

  // 宝石
  for (const o of orbs) if (!o.taken) {
    const dx = player.x + PW / 2 - o.x, dy = player.y + PH / 2 - o.y;
    if (dx * dx + dy * dy < (TILE * 0.55) * (TILE * 0.55)) {
      o.taken = true; run.orbs++; spawnParticles(o.x, o.y, 10, COL.orb, 200); sfx.orb();
    }
  }

  // 检查点
  for (const cp of checkpoints) {
    if (cp !== activeCP && player.x + PW > cp.x && player.x < cp.x + TILE && player.y + PH > cp.y && player.y < cp.y + TILE * 2) {
      activeCP = cp; spawnParticles(cp.x + TILE / 2, cp.y + TILE / 2, 12, '#7CFC9A', 200); sfx.cp();
    }
  }

  // 终点
  if (goal && player.x + PW > goal.x + 4 && player.x < goal.x + TILE - 4 && player.y + PH > goal.y && player.y < goal.y + TILE * 2) {
    completeLevel();
  }
}

function completeLevel() {
  // 记录最佳时间
  const key = 'L' + levelIndex;
  if (best[key] === undefined || levelTime < best[key]) { best[key] = +levelTime.toFixed(2); saveBest(); }
  run.time += levelTime;
  spawnParticles(goal.x + TILE / 2, goal.y, 40, COL.orb, 340);
  shake = 8;
  if (levelIndex >= LEVELS.length - 1) { run.total = run.time; state = 'win'; sfx.win(); }
  else { state = 'clear'; sfx.clear(); }
}

// ---------- 摄像机 / 视觉更新 ----------
function updateVisual(dt) {
  const tx = clamp(player.x + PW / 2 - viewW / 2, 0, Math.max(0, levelW - viewW));
  const ty = clamp(player.y + PH / 2 - viewH / 2, 0, Math.max(0, levelH - viewH));
  const k = Math.min(1, dt * 11);
  cam.x += (tx - cam.x) * k; cam.y += (ty - cam.y) * k;
  if (shake > 0) shake = Math.max(0, shake - dt * 40);
  if (flash > 0) flash = Math.max(0, flash - dt * 1.6);
  if (swapPulse > 0) swapPulse = Math.max(0, swapPulse - dt * 2.2);
  if (state === 'play' && levelIndex === 0 && hintAlpha > 0 && levelTime > 4) hintAlpha = Math.max(0, hintAlpha - dt * 0.6);
  player.anim += dt;
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.vy += p.grav * dt; p.x += p.vx * dt; p.y += p.vy * dt;
  }
}

// ---------- 主循环 ----------
let last = performance.now(), acc = 0;
function frame(now) {
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.1) dt = 0.1;
  if (state === 'play' && !showHelp) {
    acc += dt;
    let guard = 0;
    while (acc >= STEP && guard < 8) {
      if (pendingSwap) { doSwap(); pendingSwap = false; }
      if (hitstop > 0) hitstop -= STEP; else physics(STEP);
      acc -= STEP; guard++;
    }
  } else { acc = 0; if (pendingSwap) pendingSwap = false; }
  updateVisual(dt);
  render();
  requestAnimationFrame(frame);
}

// ---------- 渲染 ----------
function SX(wx) { return (wx - cam.x) * scale + (shake > 0 ? (Math.random() - 0.5) * shake : 0); }
function SY(wy) { return (wy - cam.y) * scale + (shake > 0 ? (Math.random() - 0.5) * shake : 0); }

function render() {
  // 背景渐变（随世界变化）
  const g = ctx.createLinearGradient(0, 0, 0, H);
  if (world === LIGHT) { g.addColorStop(0, COL.lightBgTop); g.addColorStop(1, COL.lightBgBot); }
  else { g.addColorStop(0, COL.darkBgTop); g.addColorStop(1, COL.darkBgBot); }
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  drawParallax();

  if (state === 'title') { drawTitle(); return; }

  // 关卡瓦片
  const c0 = Math.max(0, Math.floor(cam.x / TILE) - 1), c1 = Math.min(cols - 1, Math.ceil((cam.x + viewW) / TILE) + 1);
  const r0 = Math.max(0, Math.floor(cam.y / TILE) - 1), r1 = Math.min(rows - 1, Math.ceil((cam.y + viewH) / TILE) + 1);
  for (let r = r0; r <= r1; r++) for (let c = c0; c <= c1; c++) {
    const ch = grid[r][c]; if (ch === ' ') continue;
    drawTile(c, r, ch);
  }
  drawSpikes(); drawCheckpoints(); drawOrbs(); drawGoal();
  if (player.alive || player.respawn > 0.4) drawPlayer();
  drawParticles();

  // 全屏闪光
  if (flash > 0) { ctx.fillStyle = flashCol; ctx.globalAlpha = Math.min(0.6, flash); ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1; }

  drawHUD();
  if (state === 'play' && levelIndex === 0 && hintAlpha > 0) drawHint();
  if (state === 'clear') drawClear();
  if (state === 'win') drawWin();
  if (showHelp) drawHelp();
}

function drawParallax() {
  // 两层缓慢浮动的几何装饰
  const layers = world === LIGHT
    ? [{ a: 0.10, col: '#ffffff', k: 0.2 }, { a: 0.08, col: '#ffcf6b', k: 0.4 }]
    : [{ a: 0.10, col: '#3a4080', k: 0.2 }, { a: 0.14, col: '#5b7cff', k: 0.4 }];
  for (let li = 0; li < layers.length; li++) {
    const L = layers[li]; ctx.fillStyle = L.col; ctx.globalAlpha = L.a;
    for (let i = 0; i < 6; i++) {
      const bx = ((i * 360 + li * 140) - cam.x * L.k) % (W + 400) ;
      const x = (bx < -200 ? bx + W + 400 : bx);
      const y = 80 + ((i * 97 + li * 60) % (H - 200));
      const rad = 60 + (i % 3) * 30;
      ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}

function drawTile(c, r, ch) {
  const x = (c * TILE - cam.x) * scale, y = (r * TILE - cam.y) * scale, s = TILE * scale;
  let fill, edge, solid;
  if (ch === '#') { fill = COL.both; edge = COL.bothEdge; solid = true; }
  else if (ch === 'L') { fill = COL.light; edge = COL.lightEdge; solid = (world === LIGHT); }
  else { fill = COL.dark; edge = COL.darkEdge; solid = (world === DARK); }

  if (solid) {
    const pulse = 1 + swapPulse * 0.06;
    ctx.fillStyle = fill;
    roundRect(x + 1, y + 1, s - 2, s - 2, 6 * scale); ctx.fill();
    // 顶部高光条
    ctx.fillStyle = edge; ctx.globalAlpha = 0.9;
    roundRect(x + 3, y + 3, s - 6, Math.max(3, s * 0.16), 4 * scale); ctx.fill();
    ctx.globalAlpha = 1;
    if (swapPulse > 0) { ctx.strokeStyle = edge; ctx.globalAlpha = swapPulse * 0.8; ctx.lineWidth = 2; roundRect(x + 1, y + 1, s - 2, s - 2, 6 * scale); ctx.stroke(); ctx.globalAlpha = 1; }
  } else {
    // 幽灵轮廓：另一个世界的平台，踩不到
    ctx.save();
    ctx.strokeStyle = fill; ctx.globalAlpha = 0.5; ctx.lineWidth = 2;
    ctx.setLineDash([7 * scale, 6 * scale]);
    roundRect(x + 4, y + 4, s - 8, s - 8, 6 * scale); ctx.stroke();
    ctx.globalAlpha = 0.10; ctx.fillStyle = fill; ctx.fill();
    ctx.restore();
  }
}

function drawSpikes() {
  for (const s of spikes) {
    const x = (s.x - cam.x) * scale, y = (s.y - cam.y) * scale, ss = TILE * scale;
    ctx.fillStyle = COL.spike;
    const n = 3;
    for (let i = 0; i < n; i++) {
      const bx = x + (i + 0.5) * ss / n;
      ctx.beginPath();
      ctx.moveTo(bx - ss / (2 * n), y + ss);
      ctx.lineTo(bx, y + ss * 0.28);
      ctx.lineTo(bx + ss / (2 * n), y + ss);
      ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fillRect(x, y + ss - 4 * scale, ss, 4 * scale);
  }
}

function drawCheckpoints() {
  for (const cp of checkpoints) {
    const x = (cp.x - cam.x) * scale, y = (cp.y - cam.y) * scale, ss = TILE * scale;
    const on = cp === activeCP;
    ctx.strokeStyle = on ? '#7CFC9A' : 'rgba(255,255,255,0.5)'; ctx.lineWidth = 3 * scale;
    ctx.beginPath(); ctx.moveTo(x + ss * 0.3, y + ss); ctx.lineTo(x + ss * 0.3, y + ss * 0.1); ctx.stroke();
    ctx.fillStyle = on ? '#7CFC9A' : 'rgba(255,255,255,0.35)';
    const fw = ss * 0.5, fh = ss * 0.32, fy = y + ss * 0.12 + (on ? Math.sin(player.anim * 4) * 2 : 0);
    ctx.beginPath(); ctx.moveTo(x + ss * 0.3, fy); ctx.lineTo(x + ss * 0.3 + fw, fy + fh / 2); ctx.lineTo(x + ss * 0.3, fy + fh); ctx.closePath(); ctx.fill();
    if (on) { ctx.globalAlpha = 0.25 + Math.sin(player.anim * 5) * 0.1; ctx.beginPath(); ctx.arc(x + ss * 0.3, y + ss * 0.3, ss * 0.5, 0, Math.PI * 2); ctx.fillStyle = '#7CFC9A'; ctx.fill(); ctx.globalAlpha = 1; }
  }
}

function drawOrbs() {
  for (const o of orbs) if (!o.taken) {
    const x = (o.x - cam.x) * scale, y = (o.y - cam.y) * scale + Math.sin(player.anim * 3 + o.x) * 4;
    const rad = TILE * 0.22 * scale * (1 + Math.sin(player.anim * 4 + o.x) * 0.08);
    ctx.globalAlpha = 0.3; ctx.fillStyle = COL.orb; ctx.beginPath(); ctx.arc(x, y, rad * 1.8, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
    const grd = ctx.createRadialGradient(x - rad * 0.3, y - rad * 0.3, 1, x, y, rad);
    grd.addColorStop(0, '#fff7d6'); grd.addColorStop(1, COL.orb);
    ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fffbe8'; ctx.beginPath(); ctx.arc(x - rad * 0.3, y - rad * 0.3, rad * 0.28, 0, Math.PI * 2); ctx.fill();
  }
}

function drawGoal() {
  if (!goal) return;
  const x = (goal.x - cam.x) * scale, y = (goal.y - cam.y) * scale, ss = TILE * scale;
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4 * scale;
  ctx.beginPath(); ctx.moveTo(x + ss * 0.5, y + ss); ctx.lineTo(x + ss * 0.5, y - ss * 0.6); ctx.stroke();
  const wob = Math.sin(player.anim * 5) * ss * 0.06;
  const fw = ss * 0.7, fh = ss * 0.45, fy = y - ss * 0.6;
  const grd = ctx.createLinearGradient(x, fy, x + fw, fy + fh);
  grd.addColorStop(0, COL.light); grd.addColorStop(1, COL.dark);
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.moveTo(x + ss * 0.5, fy); ctx.lineTo(x + ss * 0.5 + fw + wob, fy + fh * 0.4); ctx.lineTo(x + ss * 0.5, fy + fh); ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 0.2 + Math.sin(player.anim * 3) * 0.08; ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(x + ss * 0.5, y + ss * 0.1, ss * 0.9, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
}

function drawPlayer() {
  const blink = (!player.alive) ? (Math.floor(player.respawn * 12) % 2 === 0 ? 0.4 : 1) : 1;
  const x = (player.x - cam.x) * scale, y = (player.y - cam.y) * scale, w = PW * scale, h = PH * scale;
  ctx.globalAlpha = blink;
  // 与世界反相：光世界深色身、暗世界亮色身
  const body = world === LIGHT ? '#262633' : '#fdfcff';
  const eye = world === LIGHT ? '#fdfcff' : '#262633';
  const glow = world === LIGHT ? COL.dark : COL.light;
  // 光晕
  ctx.globalAlpha = blink * 0.35; ctx.fillStyle = glow;
  roundRect(x - 4, y - 4, w + 8, h + 8, 8 * scale); ctx.fill();
  ctx.globalAlpha = blink;
  // 身体
  ctx.fillStyle = body; roundRect(x, y, w, h, 7 * scale); ctx.fill();
  // 眼睛（朝向）
  const ex = x + w * (player.facing > 0 ? 0.62 : 0.38);
  ctx.fillStyle = eye; ctx.beginPath(); ctx.arc(ex, y + h * 0.34, w * 0.13, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(ex + player.facing * w * 0.04, y + h * 0.34, w * 0.06, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / p.max);
    ctx.fillStyle = p.color;
    const x = (p.x - cam.x) * scale, y = (p.y - cam.y) * scale;
    ctx.fillRect(x - p.size / 2, y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ---------- HUD / 文字 ----------
function txt(s, x, y, size, col, align, weight) {
  ctx.fillStyle = col || '#fff'; ctx.textAlign = align || 'left'; ctx.textBaseline = 'alphabetic';
  ctx.font = (weight || '700') + ' ' + size + 'px -apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif';
  ctx.fillText(s, x, y);
}
function fmt(t) { return t.toFixed(1) + 's'; }

function drawHUD() {
  const pad = 12, barH = 38, barW = Math.min(W - 24, 560);
  ctx.fillStyle = 'rgba(0,0,0,0.32)'; roundRect(pad, pad, barW, barH, 10); ctx.fill();
  const tot = orbs.length, got = orbs.filter(o => o.taken).length;
  const bk = best['L' + levelIndex];
  const y = pad + 25;
  txt('关卡 ' + (levelIndex + 1) + '/' + LEVELS.length, pad + 14, y, 16, '#fff');
  txt('⏱ ' + fmt(levelTime), pad + 130, y, 16, '#ffe49a');
  txt('💀 ' + levelDeaths, pad + 250, y, 16, '#ff9aa8');
  txt('◆ ' + got + '/' + tot, pad + 330, y, 16, COL.orb);
  if (bk !== undefined) txt('最佳 ' + fmt(bk), pad + 430, y, 16, '#9ce8ff');
}

function drawHint() {
  ctx.globalAlpha = hintAlpha;
  const y = H - 70;
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; roundRect(W / 2 - 230, y - 26, 460, 40, 10); ctx.fill();
  txt('实线=可踩 · 虚线=另一个世界(踩不到) · 切换让它们互换', W / 2, y, 15, '#fff', 'center');
  ctx.globalAlpha = 1;
}

function drawHelp() {
  const touch = isTouch();
  // 半透明全屏遮罩
  ctx.fillStyle = 'rgba(8,10,24,0.86)'; ctx.fillRect(0, 0, W, H);
  const cx = W / 2;
  txt('玩法说明', cx, H * 0.13, Math.min(40, W * 0.085), '#fff', 'center', '800');

  // 正文分段（标题色 + 内容色）
  const blocks = [
    ['【目标】', '抵达终点旗 ⚑，沿途尽量收集宝石 ◆，刷新最佳时间'],
    ['【核心机制】', '按「切换」瞬间翻转 光明 / 黑暗 两个重叠世界'],
    ['', '实线方块 = 可踩 · 虚线方块 = 另一个世界(踩不到)'],
    ['', '常在半空切换，让脚下的平台凭空出现'],
    ['【图例】', '灰=双世界实体 · 金=仅光明 · 青=仅黑暗'],
    ['', '红三角=尖刺(致命) · 绿旗=检查点'],
    ['【提示】', '死亡会秒回最近检查点，大胆试错'],
  ];
  const ctrl = touch
    ? ['【操作】', '◀ ▶ 移动 · ↑ 跳(长按更高) · 切换 = 翻转世界']
    : ['【操作】', 'A/D 或 ←→ 移动 · W/↑/空格 跳 · Shift/J 切换 · R 重开'];
  blocks.splice(4, 0, ctrl); // 把操作放在机制之后、图例之前

  const fs = Math.min(18, W * 0.038);
  const lh = Math.min(34, H * 0.058);
  let y = H * 0.24;
  for (const [head, body] of blocks) {
    let x = cx;
    ctx.textAlign = 'center';
    if (head) {
      // 测量整体宽度，让 标题 + 内容 居中拼接
      ctx.font = '800 ' + fs + 'px -apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif';
      const hw = ctx.measureText(head).width;
      ctx.font = '500 ' + fs + 'px -apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif';
      const bw = ctx.measureText(body).width;
      const startX = cx - (hw + bw) / 2;
      txt(head, startX, y, fs, '#ffe49a', 'left', '800');
      txt(body, startX + hw, y, fs, 'rgba(255,255,255,0.92)', 'left', '500');
    } else {
      txt(body, cx, y, fs, 'rgba(255,255,255,0.78)', 'center', '500');
    }
    y += lh;
  }

  // 关闭提示
  const a = 0.5 + Math.sin(performance.now() / 400) * 0.5;
  ctx.globalAlpha = a;
  txt(touch ? '点击任意处关闭' : '点击或按任意键关闭', cx, H * 0.92, Math.min(19, W * 0.042), '#9ce8ff', 'center', '700');
  ctx.globalAlpha = 1;
}

function drawTitle() {
  // 标题画面
  const cx = W / 2;
  ctx.save();
  // 大字
  txt('双 生 世 界', cx, H * 0.30, Math.min(64, W * 0.12), '#fff', 'center', '800');
  txt('TWIN  WORLDS', cx, H * 0.30 + 34, Math.min(20, W * 0.04), 'rgba(255,255,255,0.6)', 'center', '600');
  txt('一键切换光暗双重世界 · 踩着此消彼长的平台冲向终点', cx, H * 0.30 + 74, Math.min(17, W * 0.035), 'rgba(255,255,255,0.85)', 'center', '500');

  // 双色示意
  const dy = H * 0.52, bw = 70, gap = 16;
  ctx.fillStyle = COL.light; roundRect(cx - bw - gap - bw, dy, bw, 36, 6); ctx.fill();
  txt('光·实', cx - bw - gap - bw / 2, dy + 24, 15, '#3a2b00', 'center');
  ctx.strokeStyle = COL.dark; ctx.setLineDash([7, 6]); ctx.lineWidth = 2;
  roundRect(cx - bw, dy, bw, 36, 6); ctx.stroke(); ctx.setLineDash([]);
  txt('暗·虚', cx - bw / 2, dy + 24, 15, COL.dark, 'center');
  txt('↔ 一键切换', cx + gap + 30, dy + 24, 16, '#fff', 'center');

  // 操作说明
  const oy = H * 0.66;

  } else {
    txt('A / D 或 ← →  移动     W / ↑ / 空格  跳跃', cx, oy, Math.min(17, W * 0.034), 'rgba(255,255,255,0.85)', 'center', '500');
    txt('Shift / J  切换世界      R  重开本关', cx, oy + 26, Math.min(17, W * 0.034), 'rgba(255,255,255,0.85)', 'center', '500');
  }
  // 开始提示
  const a = 0.5 + Math.sin(performance.now() / 400) * 0.5;
  ctx.globalAlpha = a;
  txt(touch ? '点击屏幕开始' : '按任意键开始', cx, H * 0.82, Math.min(22, W * 0.05), '#ffe49a', 'center', '700');
  ctx.globalAlpha = 1;
  ctx.restore();
}

function panel(title, lines, footer) {
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H);
  const cx = W / 2;
  txt(title, cx, H * 0.33, Math.min(46, W * 0.09), '#fff', 'center', '800');
  let y = H * 0.46;
  for (const l of lines) { txt(l, cx, y, Math.min(20, W * 0.042), '#ffe49a', 'center', '600'); y += 32; }
  const a = 0.5 + Math.sin(performance.now() / 400) * 0.5;
  ctx.globalAlpha = a; txt(footer, cx, H * 0.72, Math.min(20, W * 0.044), '#9ce8ff', 'center', '700'); ctx.globalAlpha = 1;
}

function drawClear() {
  const bk = best['L' + levelIndex];
  panel('过关！', [
    LEVELS[levelIndex].name,
    '用时 ' + fmt(levelTime) + '   死亡 ' + levelDeaths + '   宝石 ' + orbs.filter(o => o.taken).length + '/' + orbs.length,
    bk !== undefined ? '本关最佳 ' + fmt(bk) : ''
  ].filter(Boolean), isTouch() ? '点击进入下一关' : '按任意键进入下一关');
}

function drawWin() {
  panel('全部通关！', [
    '总用时 ' + fmt(run.total),
    '总死亡 ' + run.deaths + '   收集宝石 ' + run.orbs,
    '你已看穿双生世界 ✦'
  ], isTouch() ? '点击回到标题' : '按任意键回到标题');
}

// ---------- 输入处理 ----------
function isTouch() { return ('ontouchstart' in window) || navigator.maxTouchPoints > 0; }

function advance() {
  audioReady();
  if (state === 'title') { run = { time: 0, deaths: 0, orbs: 0, total: 0 }; startLevel(0); }
  else if (state === 'clear') { startLevel(levelIndex + 1); }
  else if (state === 'win') { state = 'title'; }
}

function pressJump() { player.jbuf = JUMP_BUFFER; player.jumpHeld = true; }
function releaseJump() { player.jumpHeld = false; }

window.addEventListener('keydown', (e) => {
  audioReady();
  if (showHelp) { if (!e.repeat) showHelp = false; e.preventDefault(); return; }
  if (e.code === 'KeyH') { if (!e.repeat) showHelp = true; e.preventDefault(); return; }
  if (state !== 'play') {
    if (!e.repeat) advance();
    return;
  }
  switch (e.code) {
    case 'ArrowLeft': case 'KeyA': input.left = true; e.preventDefault(); break;
    case 'ArrowRight': case 'KeyD': input.right = true; e.preventDefault(); break;
    case 'ArrowUp': case 'KeyW': case 'Space': if (!e.repeat) pressJump(); e.preventDefault(); break;
    case 'ShiftLeft': case 'ShiftRight': case 'KeyJ': case 'KeyK': if (!e.repeat) pendingSwap = true; e.preventDefault(); break;
    case 'KeyR': startLevel(levelIndex); e.preventDefault(); break;
  }
});
window.addEventListener('keyup', (e) => {
  switch (e.code) {
    case 'ArrowLeft': case 'KeyA': input.left = false; break;
    case 'ArrowRight': case 'KeyD': input.right = false; break;
    case 'ArrowUp': case 'KeyW': case 'Space': releaseJump(); break;
  }
});

// 鼠标/触摸点击推进非游戏界面
canvas.addEventListener('pointerdown', () => {
  if (showHelp) { showHelp = false; return; }
  if (state !== 'play') advance();
});

// 触摸虚拟按键
function bindBtn(id, onDown, onUp) {
  const el = document.getElementById(id);
  const down = (e) => { e.preventDefault(); audioReady(); el.classList.add('press'); onDown(); };
  const up = (e) => { e.preventDefault(); el.classList.remove('press'); if (onUp) onUp(); };
  el.addEventListener('touchstart', down, { passive: false });
  el.addEventListener('touchend', up, { passive: false });
  el.addEventListener('touchcancel', up, { passive: false });
  el.addEventListener('mousedown', down);
  el.addEventListener('mouseup', up);
  el.addEventListener('mouseleave', (e) => { if (el.classList.contains('press')) up(e); });
}
// 玩法说明按钮（所有平台始终可用，点击开关浮层）
(function () {
  const el = document.getElementById('bHelp');
  const toggle = (e) => {
    e.preventDefault(); e.stopPropagation(); audioReady();
    showHelp = !showHelp;
  };
  el.addEventListener('touchstart', toggle, { passive: false });
  el.addEventListener('mousedown', toggle);
})();

if (isTouch()) {
  document.getElementById('touch').classList.add('on');
  bindBtn('bLeft', () => input.left = true, () => input.left = false);
  bindBtn('bRight', () => input.right = true, () => input.right = false);
  bindBtn('bJump', () => { if (state === 'play') pressJump(); }, () => releaseJump());
  bindBtn('bSwap', () => { if (state === 'play') pendingSwap = true; });
}

// ---------- 启动 ----------
requestAnimationFrame((t) => { last = t; requestAnimationFrame(frame); });
</script>
