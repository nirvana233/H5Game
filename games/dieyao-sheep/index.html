<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>叠了个叠 · 三消叠叠乐</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    height:100%;
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:linear-gradient(160deg,#8fd3a8 0%,#5cb87f 45%,#3f9e6a 100%);
    color:#2c3e2f; overflow:hidden; user-select:none;
    display:flex; flex-direction:column; align-items:center;
  }
  /* 顶部 HUD */
  #hud{
    width:100%; max-width:460px; display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; gap:8px;
  }
  .hud-chip{
    background:rgba(255,255,255,.85); border-radius:14px; padding:6px 12px;
    font-weight:800; font-size:14px; box-shadow:0 2px 6px rgba(0,0,0,.12);
    display:flex; align-items:center; gap:5px;
  }
  .hud-chip small{ font-weight:600; opacity:.6; font-size:11px; }
  .icon-btn{
    background:rgba(255,255,255,.85); border:none; border-radius:14px; width:38px; height:38px;
    font-size:18px; box-shadow:0 2px 6px rgba(0,0,0,.12); cursor:pointer;
  }
  .icon-btn:active{ transform:scale(.92); }
  /* 舞台 */
  #stage{
    position:relative; margin:0 auto;
    background:rgba(255,255,255,.16);
    border-radius:20px;
    box-shadow:inset 0 0 0 3px rgba(255,255,255,.25);
  }
  #tray-bar{ position:absolute; }
  .slot{
    position:absolute; border-radius:12px;
    background:rgba(0,0,0,.10);
    box-shadow:inset 0 2px 4px rgba(0,0,0,.15);
  }
  #stage.warn #tray-bar{ animation:wob .4s ease-in-out infinite; }
  @keyframes wob{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
  /* 方块 */
  .tile{
    position:absolute; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(180deg,#ffffff,#f1f4ee);
    border-radius:12px; box-shadow:0 3px 0 #c9cfc4, 0 4px 8px rgba(0,0,0,.18);
    cursor:pointer; line-height:1;
    transition:left .24s cubic-bezier(.3,1.2,.5,1), top .24s cubic-bezier(.3,1.2,.5,1),
               width .2s, height .2s, transform .18s, opacity .18s, box-shadow .2s;
  }
  .tile:active{ transform:scale(.94); }
  .tile.covered{ cursor:default; filter:brightness(.62) saturate(.7); box-shadow:0 2px 0 #b9bfb4; }
  .tile.covered::after{
    content:""; position:absolute; inset:0; border-radius:12px; background:rgba(20,30,20,.34);
  }
  .tile.pop{ transform:scale(0) rotate(20deg); opacity:0; }
  /* 道具栏 */
  #props{ display:flex; gap:10px; margin-top:10px; }
  .prop{
    background:rgba(255,255,255,.9); border:none; border-radius:16px; padding:9px 14px;
    font-size:14px; font-weight:800; color:#2c3e2f; cursor:pointer;
    box-shadow:0 3px 0 #cdd3c7, 0 4px 8px rgba(0,0,0,.14); display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  .prop:active{ transform:translateY(2px); box-shadow:0 1px 0 #cdd3c7; }
  .prop b{ font-size:18px; }
  .prop span{ font-size:11px; opacity:.7; }
  .prop:disabled{ opacity:.4; box-shadow:none; }
  /* 遮罩弹窗 */
  .overlay{
    position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center;
    background:rgba(20,40,25,.55); backdrop-filter:blur(4px); padding:24px;
  }
  .overlay.hidden{ display:none; }
  .card{
    background:#fff; border-radius:24px; padding:28px 24px; max-width:340px; width:100%; text-align:center;
    box-shadow:0 18px 50px rgba(0,0,0,.3); animation:pop .35s cubic-bezier(.3,1.4,.5,1);
  }
  @keyframes pop{ from{transform:scale(.7); opacity:0} to{transform:scale(1); opacity:1} }
  .card .big{ font-size:54px; line-height:1; margin-bottom:8px; }
  .card h1{ font-size:24px; margin-bottom:6px; color:#2f6b46; }
  .card p{ font-size:14px; color:#5a6b5d; line-height:1.6; margin-bottom:18px; }
  .card .hint{ background:#f2f7f0; border-radius:14px; padding:12px; font-size:13px; text-align:left; color:#4a5a4d; margin-bottom:18px; line-height:1.7; }
  .btn{
    display:block; width:100%; border:none; border-radius:16px; padding:14px; font-size:17px; font-weight:800;
    cursor:pointer; margin-top:10px; color:#fff;
    background:linear-gradient(180deg,#5fd08a,#3fa86a); box-shadow:0 4px 0 #2f8a54;
  }
  .btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #2f8a54; }
  .btn.gray{ background:linear-gradient(180deg,#cfd6cb,#aab2a4); box-shadow:0 4px 0 #8c948a; color:#36433a; }
  .lvtag{ display:inline-block; background:#eafaef; color:#2f8a54; font-weight:800; border-radius:10px; padding:4px 10px; font-size:12px; margin-bottom:10px; }
</style>
</head>
<body>

  <div id="hud">
    <div class="hud-chip" id="lvChip"><small>关卡</small><span id="lvNum">1</span></div>
    <div class="hud-chip"><small>分数</small><span id="scoreNum">0</span></div>
    <button class="icon-btn" id="muteBtn" title="静音">🔊</button>
    <button class="icon-btn" id="restartBtn" title="重玩">🔄</button>
  </div>

  <div id="stage"><div id="tray-bar"></div></div>

  <div id="props">
    <button class="prop" id="undoBtn"><b>↩️</b><span>撤销 <i class="cnt">3</i></span></button>
    <button class="prop" id="shuffleBtn"><b>🔀</b><span>洗牌 <i class="cnt">1</i></span></button>
    <button class="prop" id="pullBtn"><b>⤴️</b><span>移出 <i class="cnt">1</i></span></button>
  </div>

  <!-- 开始 -->
  <div class="overlay" id="startOverlay">
    <div class="card">
      <div class="big">🐑</div>
      <h1>叠了个叠</h1>
      <p>三消叠叠乐 · 你能闯过地狱第二关吗？</p>
      <div class="hint">
        🎯 点击<b>没被压住</b>的方块，放进下方 7 个槽位<br>
        ✨ 槽里凑齐 <b>3 个相同</b> 自动消除<br>
        💀 7 格填满还没消除 = 游戏结束<br>
        🧰 卡住了？用 撤销 / 洗牌 / 移出 救场
      </div>
      <button class="btn" id="startBtn">开始游戏</button>
    </div>
  </div>

  <!-- 结算 -->
  <div class="overlay hidden" id="endOverlay">
    <div class="card">
      <div class="big" id="endEmoji">🎉</div>
      <span class="lvtag" id="endTag">第一关</span>
      <h1 id="endTitle">通关啦！</h1>
      <p id="endDesc">太强了，继续挑战下一关！</p>
      <button class="btn" id="endPrimary">下一关</button>
      <button class="btn gray" id="endShare">📤 晒成绩给好友</button>
      <button class="btn gray" id="endRetry">再玩一次</button>
    </div>
  </div>

<script>
/* ===================== 基础配置 ===================== */
const EMOJIS = ['🐑','🐮','🐷','🐰','🐸','🐱','🐶','🐼','🐨','🦊','🐯','🐵'];
const TRAY_CAP = 7;            // 槽位容量，满则输

// 关卡配置：层数 / 花色数 / 横向半宽(以方块为单位) / 行数
const LEVELS = {
  1: { layers:3, types:4, halfW:2.0, rows:3, name:'第一关 · 热身', tip:'轻松上手，先找找手感～' },
  2: { layers:5, types:8, halfW:2.5, rows:4, name:'第二关 · 地狱', tip:'传说中的鬼畜第二关，祝你好运💀' },
};

let STAGEW, STAGEH, TILE, BOARD_TOP, BOARD_BOTTOM, TRAY_Y, TRAY_X0;

const stage   = document.getElementById('stage');
const trayBar = document.getElementById('tray-bar');

/* ===================== 运行时状态 ===================== */
let tiles = [];        // 所有方块（DOM 常驻，用 state 驱动显隐）
let tray  = [];        // 槽位里的方块（顺序即槽位下标）
let history = [];      // 撤销快照
let props = { undo:3, shuffle:1, pull:1 };
let score = 0, combo = 0;
let level = 1, maxUnlocked = 1;
let busy = false, gameOver = false, muted = false;

/* ===================== 布局计算 ===================== */
function computeLayout(){
  STAGEW = Math.min(window.innerWidth - 16, 440);
  TILE   = Math.floor((STAGEW - 6) / 7);          // 7 个正好横向铺满槽位
  STAGEH = Math.min(Math.round(window.innerHeight * 0.74), Math.round(STAGEW * 1.5));
  BOARD_TOP    = 16;
  TRAY_Y       = STAGEH - TILE - 14;
  BOARD_BOTTOM = TRAY_Y - 14;
  TRAY_X0      = Math.round((STAGEW - 7 * TILE) / 2);

  stage.style.width  = STAGEW + 'px';
  stage.style.height = STAGEH + 'px';

  // 画 7 个槽位底框
  trayBar.innerHTML = '';
  trayBar.style.left = '0'; trayBar.style.top = '0';
  for(let i=0;i<7;i++){
    const s = document.createElement('div');
    s.className = 'slot';
    s.style.left = (TRAY_X0 + i*TILE + 3) + 'px';
    s.style.top  = (TRAY_Y + 3) + 'px';
    s.style.width  = (TILE - 6) + 'px';
    s.style.height = (TILE - 6) + 'px';
    trayBar.appendChild(s);
  }
}
const trayX = i => TRAY_X0 + i*TILE;

/* ===================== 关卡生成 ===================== */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.random()*(i+1)|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }

function generate(lv){
  const cfg = LEVELS[lv];
  const cx  = STAGEW / 2;
  const pos = [];

  for(let l=0; l<cfg.layers; l++){
    const off   = (l % 2) ? TILE/2 : 0;          // 奇数层半格错位 → 压在下层接缝上
    const inset = l * TILE * 0.32;               // 每层向内收，形成金字塔
    const hw    = cfg.halfW * TILE - inset;       // 该层横向半宽
    if(hw < TILE) continue;
    const x0  = cx - hw + off;
    const x1  = cx + hw;
    const top = BOARD_TOP + l * TILE * 0.42 + off;
    const rows = Math.max(2, cfg.rows - Math.floor(l * 0.6));
    for(let r=0; r<rows; r++){
      const y = top + r * TILE;
      if(y > BOARD_BOTTOM - TILE) break;
      for(let x=x0; x<=x1; x+=TILE){
        const xx = Math.max(2, Math.min(x, STAGEW - TILE - 2));
        pos.push({ x:xx, y:Math.round(y), layer:l });
      }
    }
  }

  // 裁剪到 3 的倍数，保证每种花色数量都是 3 的倍数（可解性前提）
  const usable = pos.length - (pos.length % 3);
  const chosen = pos.slice(0, usable);
  const bag = [];
  for(let i=0; i<usable/3; i++){
    const e = EMOJIS[i % cfg.types];
    bag.push(e, e, e);
  }
  shuffle(bag);

  // 构建方块 DOM
  stage.querySelectorAll('.tile').forEach(el => el.remove());
  tiles = chosen.map((p,i) => {
    const el = document.createElement('div');
    el.className = 'tile';
    el.textContent = bag[i];
    el.addEventListener('click', () => selectTile(t));
    stage.appendChild(el);
    const t = { id:i, type:bag[i], x:p.x, y:p.y, layer:p.layer, state:'board', covered:false, el };
    return t;
  });
}

/* ===================== 渲染 ===================== */
function place(t, x, y, size, z){
  const s = t.el.style;
  s.width = size+'px'; s.height = size+'px';
  s.left = x+'px'; s.top = y+'px';
  s.fontSize = (size*0.56)+'px';
  s.zIndex = z;
}

function render(){
  const board = tiles.filter(t => t.state === 'board');
  // 覆盖检测：被更高层方块重叠则不可点
  for(const a of board){
    let cov = false;
    for(const b of board){
      if(b.layer > a.layer && Math.abs(a.x-b.x) < TILE-4 && Math.abs(a.y-b.y) < TILE-4){ cov = true; break; }
    }
    a.covered = cov;
    a.el.classList.toggle('covered', cov);
  }
  for(const t of tiles){
    if(t.state === 'board'){
      t.el.style.display = 'flex'; t.el.classList.remove('pop');
      place(t, t.x, t.y, TILE, t.layer + 1);
    } else if(t.state === 'tray'){
      t.el.style.display = 'flex'; t.el.classList.remove('covered','pop');
      const i = tray.indexOf(t);
      place(t, trayX(i), TRAY_Y, TILE, 1000 + i);
    } else { // cleared
      t.el.style.display = 'none';
    }
  }
  stage.classList.toggle('warn', tray.length >= 5 && !gameOver);
}

/* ===================== 核心交互 ===================== */
function sortTray(){ tray.sort((a,b)=> a.type < b.type ? -1 : a.type > b.type ? 1 : 0); }
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function selectTile(t){
  if(busy || gameOver || t.state !== 'board' || t.covered) return;
  busy = true;
  takeSnapshot();
  t.state = 'tray';
  tray.push(t);
  sortTray();
  render();
  beep(440);
  await sleep(240);
  await resolveMatches();
  render();
  busy = false;
  checkEnd();
}

async function resolveMatches(){
  while(true){
    const counts = {};
    tray.forEach(t => counts[t.type] = (counts[t.type]||0) + 1);
    const hit = Object.keys(counts).find(k => counts[k] >= 3);
    if(!hit) break;
    const three = tray.filter(t => t.type === hit).slice(0, 3);
    three.forEach(t => t.el.classList.add('pop'));
    beep(720);
    await sleep(200);
    three.forEach(t => t.state = 'cleared');
    tray = tray.filter(t => !three.includes(t));
    score += 30; combo += 1; updateHUD();
    render();
    await sleep(150);
  }
}

function checkEnd(){
  if(tiles.every(t => t.state === 'cleared')){ win(); return true; }
  if(tray.length >= TRAY_CAP){ lose(); return true; }
  return false;
}

/* ===================== 道具 ===================== */
function snapshot(){
  return {
    st: tiles.map(t=>t.state), ty: tiles.map(t=>t.type),
    lay: tiles.map(t=>t.layer), px: tiles.map(t=>t.x), py: tiles.map(t=>t.y),
    tray: tray.map(t=>t.id), score, combo,
  };
}
function takeSnapshot(){ history.push(snapshot()); if(history.length > 60) history.shift(); }

function undo(){
  if(props.undo <= 0 || busy || gameOver) return;
  const s = history.pop();
  if(!s) return;
  props.undo--; updateProps();
  tiles.forEach((t,i) => {
    t.state = s.st[i]; t.type = s.ty[i]; t.layer = s.lay[i]; t.x = s.px[i]; t.y = s.py[i];
    t.el.textContent = s.ty[i]; t.el.classList.remove('pop');
  });
  tray = s.tray.map(id => tiles[id]);
  score = s.score; combo = s.combo; updateHUD();
  render();
}

function useShuffle(){
  if(props.shuffle <= 0 || busy || gameOver) return;
  props.shuffle--; updateProps();
  takeSnapshot();
  const board = tiles.filter(t => t.state === 'board');
  const types = shuffle(board.map(t => t.type));
  board.forEach((t,i) => { t.type = types[i]; t.el.textContent = types[i]; });
  beep(520);
  render();
}

function usePull(){
  if(props.pull <= 0 || busy || gameOver) return;
  const n = Math.min(3, tray.length);
  if(n === 0) return;
  props.pull--; updateProps();
  takeSnapshot();
  const moved = tray.splice(0, n);                       // 取出最左 3 个
  const topLayer = Math.max(0, ...tiles.map(t => t.layer)) + 2;
  moved.forEach((t,i) => {                               // 放回牌堆顶（自由可点）
    t.state = 'board'; t.layer = topLayer;
    t.x = Math.max(2, (STAGEW - n*(TILE+8))/2 + i*(TILE+8));
    t.y = BOARD_TOP;
  });
  beep(380);
  render();
}

/* ===================== HUD / 结算 ===================== */
function updateHUD(){
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('lvNum').textContent = level;
}
function updateProps(){
  document.querySelector('#undoBtn .cnt').textContent = props.undo;
  document.querySelector('#shuffleBtn .cnt').textContent = props.shuffle;
  document.querySelector('#pullBtn .cnt').textContent = props.pull;
  document.getElementById('undoBtn').disabled = props.undo <= 0;
  document.getElementById('shuffleBtn').disabled = props.shuffle <= 0;
  document.getElementById('pullBtn').disabled = props.pull <= 0;
}

function showEnd({ emoji, tag, title, desc, primaryText, onPrimary }){
  gameOver = true;
  stage.classList.remove('warn');
  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endTag').textContent = tag;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endDesc').textContent = desc;
  const pb = document.getElementById('endPrimary');
  pb.textContent = primaryText;
  pb.onclick = onPrimary;
  document.getElementById('endOverlay').classList.remove('hidden');
}

function win(){
  beep(880);
  const hasNext = LEVELS[level + 1] != null;
  if(hasNext) maxUnlocked = Math.max(maxUnlocked, level + 1);
  showEnd({
    emoji:'🎉', tag:LEVELS[level].name, title:'通关啦！',
    desc:`得分 ${score}！` + (hasNext ? '解锁下一关，地狱在等你～' : '你已通关全部关卡，封神！'),
    primaryText: hasNext ? '挑战下一关 →' : '🔄 再玩一次',
    onPrimary: hasNext ? () => startLevel(level + 1) : () => startLevel(1),
  });
}
function lose(){
  beep(140);
  showEnd({
    emoji:'💀', tag:LEVELS[level].name, title:'槽位满了！',
    desc:`差一点点～得分 ${score}，再来一把？`,
    primaryText:'再试一次', onPrimary: () => startLevel(level),
  });
}

function share(){
  const txt = `我在【叠了个叠】闯到了「${LEVELS[level].name}」，得分 ${score}！🐑\n你能过这关三消地狱吗？来挑战👉`;
  if(navigator.share){
    navigator.share({ title:'叠了个叠', text:txt, url:location.href }).catch(()=>{});
  } else {
    navigator.clipboard?.writeText(txt + ' ' + location.href);
    alert('成绩已复制到剪贴板，去粘贴给好友吧！\n\n' + txt);
  }
}

/* ===================== 流程控制 ===================== */
function startLevel(lv){
  level = lv;
  score = 0; combo = 0;
  tray = []; history = [];
  props = { undo:3, shuffle:1, pull:1 };
  gameOver = false; busy = false;
  document.getElementById('endOverlay').classList.add('hidden');
  document.getElementById('startOverlay').classList.add('hidden');
  computeLayout();
  generate(lv);
  updateHUD(); updateProps();
  render();
}

/* ===================== 音效 ===================== */
let actx;
function beep(freq){
  if(muted) return;
  try{
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.frequency.value = freq; o.type = 'sine';
    o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(0.08, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.18);
    o.start(); o.stop(actx.currentTime + 0.2);
  }catch(e){}
}

/* ===================== 事件绑定 ===================== */
document.getElementById('startBtn').onclick   = () => startLevel(1);
document.getElementById('restartBtn').onclick = () => startLevel(level);
document.getElementById('undoBtn').onclick    = undo;
document.getElementById('shuffleBtn').onclick = useShuffle;
document.getElementById('pullBtn').onclick    = usePull;
document.getElementById('endShare').onclick   = share;
document.getElementById('endRetry').onclick   = () => startLevel(level);
document.getElementById('muteBtn').onclick = (e) => {
  muted = !muted;
  e.target.textContent = muted ? '🔇' : '🔊';
};

computeLayout();
window.addEventListener('resize', () => {
  if(!gameOver && document.getElementById('startOverlay').classList.contains('hidden')){
    computeLayout(); render();
  } else { computeLayout(); }
});
</script>
</body>
</html>
